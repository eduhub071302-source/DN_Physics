        <button
          id="refreshBtn"
          class="btn refresh-top-btn"
          type="button"
          title="Refresh app"
          aria-label="Refresh app"

  <section class="page-title">
    <div class="container">
      <a class="back-link" id="backLink" href="/notes/index.html">← Back to Notes</a>
      <h1 id="subjectTitle">Notes</h1>
      <p id="subjectDesc">Open topics and formula notes.</p>
    </div>
  </section>

  <section class="section controls-section">
    <div class="container">
      <div class="controls-wrap">
        <div class="search-box">
          <input
            type="search"
            id="subjectSearch"
            placeholder="Search topics, notes, algebra, vectors..."
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            inputmode="search"
          />
        </div>

        <div class="filter-box">
          <select id="categoryFilter" aria-label="Filter content">
            <option value="all">All Categories</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 id="listHeading" style="font-size: clamp(24px, 4.5vw, 34px);">All Categories</h2>

      <div class="grid" id="subjectGrid">
        <div class="empty-state">Loading...</div>
      </div>

      <div id="noResults" class="empty-state is-hidden" style="margin-top:16px;">
        No matching results found.
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      © 2026 DN Physics
    </div>
  </footer>

  <div class="music-player-wrap">
    <button
      id="musicToggleBtn"
      class="btn"
      type="button"
      aria-expanded="false"
      aria-controls="musicPanel"
    >
      🎧 Focus
    </button>

    <div id="musicPanel" class="music-panel">
      <div class="music-panel-title">Focus Mode 🎧</div>

      <label for="trackSelect" class="music-label">Select Track</label>
      <select id="trackSelect" class="music-select"></select>

      <div class="music-controls">
        <button id="playPauseBtn" class="btn btn-primary" type="button">▶ Play</button>
        <button id="stopMusicBtn" class="btn" type="button">■ Stop</button>
      </div>

      <label for="volumeSlider" class="music-label">Volume 🔊</label>
      <input
        id="volumeSlider"
        class="volume-slider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.35"
      />

      <div id="currentTrackLabel" class="music-track-label">Current: None</div>
    </div>
  </div>

  <audio id="bgMusic" loop></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    if (!window.firebaseApp) {
      const firebaseConfig = {
        apiKey: "AIzaSyA8MHkxCeD1hUkPFZA15mUpaB87B21ZZ04",
        authDomain: "dn-physics.firebaseapp.com",
        databaseURL:
          "https://dn-physics-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dn-physics",
        storageBucket: "dn-physics.firebasestorage.app",
        messagingSenderId: "550016753421",
        appId: "1:550016753421:web:8c68d2471cb87192809a44",
        measurementId: "G-JB216F8CQ9",
      };

      const app = initializeApp(firebaseConfig);
      window.firebaseApp = app;
      window.firebaseAuth = getAuth(app);
      window.firebaseDb = getDatabase(app);

  <script src="/js/app-config.js"></script>
  <script src="/js/theme-manager.js"></script>
  <script type="module" src="/js/unlock.js"></script>
  <script src="/js/access-control.js"></script>

  <script>
    const grid = document.getElementById("subjectGrid");
    const refreshBtn = document.getElementById("refreshBtn");
    const subjectTitleEl = document.getElementById("subjectTitle");
    const subjectDescEl = document.getElementById("subjectDesc");
    const subjectNavLink = document.getElementById("subjectNavLink");
    const backLink = document.getElementById("backLink");
    const listHeading = document.getElementById("listHeading");
    const searchInput = document.getElementById("subjectSearch");
    const categoryFilter = document.getElementById("categoryFilter");
    const noResults = document.getElementById("noResults");

    let currentCards = [];

    function prettifyLabel(value) {
      return (value || "")
        .replace(/-/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase())
        .trim() || "Untitled";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        stream: (params.get("stream") || "").trim(),
        group: (params.get("group") || "").trim(),
        subject: (params.get("subject") || "").trim()
      };
    }

    function getPdfPath(item) {
      if (item.pdf) return item.pdf;
      if (item.url) return item.url;
      return `/pdfs/${item.subject}/${item.file}`;
    }

    function getStreamDescription(stream) {
      const descriptions = {
        "physics": "Choose a Physics subject to view formula notes.",
        "main-maths": "Choose a Main Maths topic to open notes.",
        "basic-maths": "Choose Algebra or Geometry first."
      };

      return descriptions[stream] || "Choose a category to continue.";
    }

    function getGroupDescription(group) {
      const descriptions = {
        "algebra": "Choose an Algebra topic to open notes.",
        "geometry": "Choose a Geometry topic to open notes."
      };

      return descriptions[group] || "Choose a topic to continue.";
    }

    function getSubjectDescription(subject) {
      const descriptions = {
        "gravitational-field": "Open subtopics and formula sheets for Gravitational Field.",
        "current-electricity": "Open subtopics and formula sheets for Current Electricity.",
        "units": "Open formula sheets for Units.",
        "vectors": "Open notes for Vectors.",
        "binomial-expansion": "Open notes for Binomial Expansion.",
        "rectangles-in-connection-with-circles": "Open notes for Rectangles in Connection with Circles."
      };

      return descriptions[subject] || "Open topic notes and PDF sheets.";
    }

    function canAccessSubjectCard(subjectSlug) {
      if (typeof window.canAccessPdf === "function") {
        return window.canAccessPdf(subjectSlug);
      }
      return false;
    }

    function createLockedLink(href, allowed, text) {
      if (allowed) {
        return `<a class="btn" href="${href}">${text}</a>`;
      }

      return `<a class="btn locked-btn" href="#" onclick="event.preventDefault(); if (window.lockAlert) window.lockAlert();">🔒 Locked</a>`;
    }

    function levenshtein(a, b) {
      const matrix = Array.from({ length: b.length + 1 }, () =>
        Array(a.length + 1).fill(0)
      );

      for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
      for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          const cost = a[j - 1] === b[i - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }

      return matrix[b.length][a.length];
    }

    function fuzzyIncludes(query, text) {
      if (!query) return true;
      if (text.includes(query)) return true;

      const words = text.split(/\s+/);

      for (const word of words) {
        if (word.includes(query)) return true;

        const distance = levenshtein(query, word);
        if (query.length <= 4 && distance <= 1) return true;
        if (query.length > 4 && distance <= 2) return true;
      }

      return false;
    }

    function applyFilters() {
      const rawSearchValue = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      let visibleCount = 0;

      currentCards.forEach((card) => {
        const title = (card.dataset.title || "").toLowerCase();
        const category = (card.dataset.category || "").toLowerCase();
        const keywords = (card.dataset.keywords || "").toLowerCase();
        const description = (card.dataset.description || "").toLowerCase();

        const combinedText = `${title} ${keywords} ${description}`;

        const matchesSearch =
          rawSearchValue === "" || fuzzyIncludes(rawSearchValue, combinedText);

        const matchesCategory =
          selectedCategory === "all" || category === selectedCategory;

        const shouldShow = matchesSearch && matchesCategory;
        card.style.display = shouldShow ? "" : "none";

        if (shouldShow) visibleCount++;
      });

      noResults.classList.toggle("is-hidden", visibleCount !== 0);
    }

    function setupFilters(filterItems) {
      currentCards = Array.from(document.querySelectorAll(".subject-card"));

      const categories = [...new Set(filterItems.map((item) => item.category).filter(Boolean))];
      categoryFilter.innerHTML = `<option value="all">All Categories</option>`;

      categories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = prettifyLabel(category);
        categoryFilter.appendChild(option);
      });

      applyFilters();
    }

    function renderPhysicsSubjects(items, stream) {
      const uniqueSubjects = [...new Set(items.map((item) => item.subject).filter(Boolean))];

      document.title = "Physics | DN Physics";
      subjectTitleEl.textContent = "Physics";
      subjectDescEl.textContent = getStreamDescription(stream);
      subjectNavLink.textContent = "Physics";
      subjectNavLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}`;
      backLink.href = "/notes/index.html";
      listHeading.textContent = "All Categories";

      if (!uniqueSubjects.length) {
        grid.innerHTML = `<div class="empty-state">No Physics subjects found yet.</div>`;
        return;
      }

      const filterItems = uniqueSubjects.map((subjectSlug) => ({
        category: "physics-subject",
        title: prettifyLabel(subjectSlug),
        keywords: `${subjectSlug.replace(/-/g, " ")} physics formulas revision subject note`,
        description: getSubjectDescription(subjectSlug)
      }));

      grid.innerHTML = uniqueSubjects.map((subjectSlug, index) => {
        const subjectName = prettifyLabel(subjectSlug);
        const allowed = canAccessSubjectCard(subjectSlug);
        const link = `/subjects/index.html?stream=${encodeURIComponent(stream)}&subject=${encodeURIComponent(subjectSlug)}`;
        const description = getSubjectDescription(subjectSlug);

        return `
          <div
            class="card subject-card"
            data-title="${escapeHtml(subjectName)}"
            data-category="physics-subject"
            data-keywords="${escapeHtml(subjectSlug.replace(/-/g, " "))} physics formulas revision subject note"
            data-description="${escapeHtml(description)}"
          >
            <div class="badge">Subject ${String(index + 1).padStart(2, "0")}</div>
            <h3>${escapeHtml(subjectName)}</h3>
            <p>${escapeHtml(description)}</p>
            <div class="actions">
              ${createLockedLink(link, allowed, "Explore")}
            </div>
          </div>
        `;
      }).join("");

      setupFilters(filterItems);
    }

    function renderMainMathsSubjects(items, stream) {
      const uniqueSubjects = [...new Set(items.map((item) => item.subject).filter(Boolean))];

      document.title = "Main Maths | DN Physics";
      subjectTitleEl.textContent = "Main Maths";
      subjectDescEl.textContent = "Choose a Main Maths topic to open notes.";
      subjectNavLink.textContent = "Main Maths";
      subjectNavLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}`;
      backLink.href = "/notes/index.html";
      listHeading.textContent = "All Categories";

      if (!uniqueSubjects.length) {
        grid.innerHTML = `<div class="empty-state">No Main Maths topics found yet.</div>`;
        return;
      }

      const filterItems = uniqueSubjects.map((subjectSlug) => ({
        category: "main-maths-topic",
        title: prettifyLabel(subjectSlug),
        keywords: `${subjectSlug.replace(/-/g, " ")} main maths mechanics statics topic note`,
        description: getSubjectDescription(subjectSlug)
      }));

      grid.innerHTML = uniqueSubjects.map((subjectSlug, index) => {
        const subjectName = prettifyLabel(subjectSlug);
        const allowed = canAccessSubjectCard(subjectSlug);
        const link = `/subjects/index.html?stream=${encodeURIComponent(stream)}&subject=${encodeURIComponent(subjectSlug)}`;
        const description = getSubjectDescription(subjectSlug);

        return `
          <div
            class="card subject-card"
            data-title="${escapeHtml(subjectName)}"
            data-category="main-maths-topic"
            data-keywords="${escapeHtml(subjectSlug.replace(/-/g, " "))} main maths mechanics statics topic note"
            data-description="${escapeHtml(description)}"
          >
            <div class="badge">Topic ${String(index + 1).padStart(2, "0")}</div>
            <h3>${escapeHtml(subjectName)}</h3>
            <p>${escapeHtml(description)}</p>
            <div class="actions">
              ${createLockedLink(link, allowed, "Explore")}
            </div>
          </div>
        `;
      }).join("");

      setupFilters(filterItems);
    }

    function renderBasicMathsGroups(stream) {
      document.title = "Basic Maths | DN Physics";
      subjectTitleEl.textContent = "Basic Maths";
      subjectDescEl.textContent = getStreamDescription(stream);
      subjectNavLink.textContent = "Basic Maths";
      subjectNavLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}`;
      backLink.href = "/notes/index.html";
      listHeading.textContent = "All Categories";

      const groups = [
        {
          slug: "algebra",
          title: "Algebra",
          description: "Open Algebra topics and revision notes."
        },
        {
          slug: "geometry",
          title: "Geometry",
          description: "Open Geometry topics and revision notes."
        }
      ];

      const filterItems = groups.map((group) => ({
        category: "basic-maths-group",
        title: group.title,
        keywords: `${group.slug} basic maths revision notes category`,
        description: group.description
      }));

      grid.innerHTML = groups.map((group, index) => `
        <div
          class="card subject-card"
          data-title="${escapeHtml(group.title)}"
          data-category="basic-maths-group"
          data-keywords="${escapeHtml(group.slug)} basic maths revision notes category"
          data-description="${escapeHtml(group.description)}"
        >
          <div class="badge">Group ${String(index + 1).padStart(2, "0")}</div>
          <h3>${escapeHtml(group.title)}</h3>
          <p>${escapeHtml(group.description)}</p>
          <div class="actions">
            <a class="btn" href="/subjects/index.html?stream=${encodeURIComponent(stream)}&group=${encodeURIComponent(group.slug)}">
              Explore
            </a>
          </div>
        </div>
      `).join("");

      setupFilters(filterItems);
    }

    function renderGroupSubjects(items, stream, group) {
      const uniqueSubjects = [...new Set(
        items
          .filter((item) => item.group === group)
          .map((item) => item.subject)
          .filter(Boolean)
      )];

      const prettyGroup = prettifyLabel(group);

      document.title = `${prettyGroup} | DN Physics`;
      subjectTitleEl.textContent = prettyGroup;
      subjectDescEl.textContent = getGroupDescription(group);
      subjectNavLink.textContent = prettyGroup;
      subjectNavLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}&group=${encodeURIComponent(group)}`;
      backLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}`;
      listHeading.textContent = "All Categories";

      if (!uniqueSubjects.length) {
        grid.innerHTML = `<div class="empty-state">No topics found in this group yet.</div>`;
        return;
      }

      const filterItems = uniqueSubjects.map((subjectSlug) => ({
        category: group,
        title: prettifyLabel(subjectSlug),
        keywords: `${subjectSlug.replace(/-/g, " ")} ${group} basic maths topic note`,
        description: getSubjectDescription(subjectSlug)
      }));

      grid.innerHTML = uniqueSubjects.map((subjectSlug, index) => {
        const subjectName = prettifyLabel(subjectSlug);
        const allowed = canAccessSubjectCard(subjectSlug);
        const link =
          `/subjects/index.html?stream=${encodeURIComponent(stream)}` +
          `&group=${encodeURIComponent(group)}` +
          `&subject=${encodeURIComponent(subjectSlug)}`;
        const description = getSubjectDescription(subjectSlug);

        return `
          <div
            class="card subject-card"
            data-title="${escapeHtml(subjectName)}"
            data-category="${escapeHtml(group)}"
            data-keywords="${escapeHtml(subjectSlug.replace(/-/g, " "))} ${escapeHtml(group)} basic maths topic note"
            data-description="${escapeHtml(description)}"
          >
            <div class="badge">Topic ${String(index + 1).padStart(2, "0")}</div>
            <h3>${escapeHtml(subjectName)}</h3>
            <p>${escapeHtml(description)}</p>
            <div class="actions">
              ${createLockedLink(link, allowed, "Explore")}
            </div>
          </div>
        `;
      }).join("");

      setupFilters(filterItems);
    }

    function renderSubjectPdfs(items, stream, group, subject) {
      const subjectItems = items.filter((item) => {
        if (item.stream !== stream) return false;
        if (item.subject !== subject) return false;

        if (stream === "basic-maths") {
          return item.group === group;
        }

        return true;
      });

      const prettySubject = prettifyLabel(subject);

      document.title = `${prettySubject} | DN Physics`;
      subjectTitleEl.textContent = prettySubject;
      subjectDescEl.textContent = "Choose a note to view or open its PDF.";
      subjectNavLink.textContent = prettySubject;
      subjectNavLink.href = window.location.pathname + window.location.search;
      listHeading.textContent = "All Categories";

      if (stream === "basic-maths" && group) {
        backLink.href =
          `/subjects/index.html?stream=${encodeURIComponent(stream)}` +
          `&group=${encodeURIComponent(group)}`;
      } else {
        backLink.href = `/subjects/index.html?stream=${encodeURIComponent(stream)}`;
      }

      if (!subjectItems.length) {
        grid.innerHTML = `<div class="empty-state">No notes found for this topic yet.</div>`;
        return;
      }

      const filterItems = subjectItems.map((item) => {
        const topicTitle = item.title || prettifyLabel(item.file.replace(/\.pdf$/i, ""));
        return {
          category: "pdf-note",
          title: topicTitle,
          keywords: `${topicTitle.toLowerCase()} ${item.file.replace(/\.pdf$/i, "").replace(/-/g, " ")} pdf note formula sheet revision`,
          description: `PDF note for ${prettySubject}`
        };
      });

      grid.innerHTML = subjectItems.map((item, index) => {
        const topicTitle = item.title || prettifyLabel(item.file.replace(/\.pdf$/i, ""));

        const topicPage =
          `/topics/topic.html?stream=${encodeURIComponent(stream)}` +
          `${group ? `&group=${encodeURIComponent(group)}` : ""}` +
          `&subject=${encodeURIComponent(item.subject)}` +
          `&file=${encodeURIComponent(item.file)}` +
          `&title=${encodeURIComponent(topicTitle)}`;

        const viewerBack = (stream === "basic-maths" && group)
          ? `/subjects/index.html?stream=${encodeURIComponent(stream)}&group=${encodeURIComponent(group)}&subject=${encodeURIComponent(subject)}`
          : `/subjects/index.html?stream=${encodeURIComponent(stream)}&subject=${encodeURIComponent(subject)}`;

        const viewerPage =
          `/topics/viewer.html?pdf=${encodeURIComponent(getPdfPath(item))}` +
          `&title=${encodeURIComponent(topicTitle)}` +
          `&stream=${encodeURIComponent(stream)}` +
          `${group ? `&group=${encodeURIComponent(group)}` : ""}` +
          `&subject=${encodeURIComponent(item.subject)}` +
          `&file=${encodeURIComponent(item.file)}` +
          `&back=${encodeURIComponent(viewerBack)}` +
          `&subjectName=${encodeURIComponent(prettySubject)}`;

        return `
          <div
            class="card subject-card"
            data-title="${escapeHtml(topicTitle)}"
            data-category="pdf-note"
            data-keywords="${escapeHtml(topicTitle.toLowerCase())} ${escapeHtml(item.file.replace(/\.pdf$/i, "").replace(/-/g, " "))} pdf note formula sheet revision"
            data-description="${escapeHtml(`PDF note for ${prettySubject}`)}"
          >
            <div class="badge">Note ${String(index + 1).padStart(2, "0")}</div>
            <h3>${escapeHtml(topicTitle)}</h3>
            <div class="actions">
              <a class="btn" href="${topicPage}">
                Open ${escapeHtml(topicTitle)}
              </a>
              <a class="btn btn-primary" href="${viewerPage}">
                View PDF
              </a>
            </div>
          </div>
        `;
      }).join("");

      setupFilters(filterItems);
    }

    async function loadPage() {
      try {
        const { stream, group, subject } = getParams();

        if (!stream) {
          grid.innerHTML = `<div class="empty-state">Could not detect category.</div>`;
          return;
        }

        const res = await fetch("/pdfs/catalog.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Could not load catalog.json");

        const items = await res.json();
        const streamItems = items.filter((item) => item.stream === stream);

        if (!streamItems.length) {
          grid.innerHTML = `<div class="empty-state">No notes found for this category yet.</div>`;
          return;
        }

        if (stream === "physics" && !subject) {
          renderPhysicsSubjects(streamItems, stream);
          return;
        }

        if (stream === "main-maths" && !subject) {
          renderMainMathsSubjects(streamItems, stream);
          return;
        }

        if (stream === "basic-maths" && !group && !subject) {
          renderBasicMathsGroups(stream);
          return;
        }

        if (stream === "basic-maths" && group && !subject) {
          renderGroupSubjects(streamItems, stream, group);
          return;
        }

        if (subject) {
          renderSubjectPdfs(streamItems, stream, group, subject);
          return;
        }

        grid.innerHTML = `<div class="empty-state">This view is not ready yet.</div>`;
      } catch (error) {
        console.error(error);
        grid.innerHTML = `<div class="empty-state">Could not load notes.</div>`;
      }
    }

    if (refreshBtn) {
      refreshBtn.addEventListener("click", async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              await registration.update();
            }
          }
        } catch (error) {
          console.log("Refresh warning:", error);
        }

        window.location.reload();
      });
    }

    searchInput.addEventListener("input", applyFilters);
    categoryFilter.addEventListener("change", applyFilters);

    loadPage();
  </script>

  <script src="/js/music-player.js"></script>
</body>
</html>
