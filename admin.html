<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | DN Physics</title>
  <meta name="theme-color" content="#4ea1ff" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .admin-shell {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .admin-topbar {
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(17, 26, 43, 0.96), rgba(12, 18, 31, 0.98));
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 44px rgba(0,0,0,0.24);
    }

    .admin-topbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .admin-meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .admin-controls {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 0.9fr auto;
      gap: 12px;
    }

    .admin-controls input,
    .admin-controls select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    .admin-controls select option {
      background: #101827;
      color: #e8eefc;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .admin-stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .admin-stat-label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 8px;
    }

    .admin-stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #eef5ff;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    .admin-panel {
      min-height: 320px;
      padding: 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(17, 26, 43, 0.96), rgba(12, 18, 31, 0.98));
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 44px rgba(0,0,0,0.24);
    }

    .admin-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .admin-ticket-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .admin-ticket-card:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 161, 255, 0.25);
    }

    .admin-ticket-card.active {
      border-color: rgba(78, 161, 255, 0.42);
      box-shadow: 0 0 0 2px rgba(78, 161, 255, 0.12);
    }

    .admin-ticket-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .admin-ticket-title {
      font-weight: 800;
      color: #eef5ff;
    }

    .admin-ticket-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .admin-ticket-msg {
      color: #e6ecfb;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .admin-ticket-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .ticket-status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .ticket-status-pill.open {
      background: rgba(255, 152, 0, 0.12);
      color: #ffcc80;
      border: 1px solid rgba(255, 152, 0, 0.24);
    }

    .ticket-status-pill.read {
      background: rgba(155, 89, 182, 0.12);
      color: #d7b7ff;
      border: 1px solid rgba(155, 89, 182, 0.24);
    }

    .ticket-status-pill.replied {
      background: rgba(78, 161, 255, 0.12);
      color: #9fd0ff;
      border: 1px solid rgba(78, 161, 255, 0.24);
    }

    .ticket-status-pill.closed {
      background: rgba(76, 175, 80, 0.12);
      color: #9be7a0;
      border: 1px solid rgba(76, 175, 80, 0.24);
    }

    .admin-detail-empty {
      color: var(--muted);
      padding: 14px 0;
    }

    .admin-detail-block {
      display: grid;
      gap: 12px;
    }

    .admin-detail-card {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .admin-detail-label {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 6px;
    }

    .admin-detail-value {
      color: #eef5ff;
      line-height: 1.55;
      word-break: break-word;
    }

    .admin-detail-actions {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .admin-detail-actions select,
    .admin-detail-actions textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    .admin-detail-actions select option {
      background: #101827;
      color: #e8eefc;
    }

    .admin-detail-actions textarea {
      min-height: 120px;
      resize: vertical;
    }

    .admin-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .admin-action-row .btn {
      flex: 1 1 160px;
    }

    .admin-feedback {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .admin-feedback.show {
      display: block;
    }

    .admin-feedback.success {
      background: rgba(76, 175, 80, 0.12);
      border: 1px solid rgba(76, 175, 80, 0.24);
      color: #a5efaa;
    }

    .admin-feedback.error {
      background: rgba(244, 67, 54, 0.12);
      border: 1px solid rgba(244, 67, 54, 0.24);
      color: #ffb3ad;
    }

    @media (max-width: 980px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }

      .admin-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .admin-controls {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .admin-stats {
        grid-template-columns: 1fr;
      }

      .admin-action-row {
        flex-direction: column;
      }

      .admin-panel,
      .admin-topbar {
        padding: 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="brand">DN Physics</div>
      <nav class="nav-links" aria-label="Admin navigation">
        <a href="/index.html">Home</a>
        <a href="/contact.html">Contact</a>
        <a href="/refund-policy.html">Refunds</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <a href="/index.html" class="back-link">← Back to Home</a>
      <div class="badge">Admin Dashboard</div>

      <div class="admin-shell">
        <div class="admin-topbar">
          <div class="admin-topbar-row">
            <div>
              <h1 style="margin: 0 0 6px;">Support & Refunds</h1>
              <div id="adminUserMeta" class="admin-meta">Checking admin access...</div>
            </div>
            <button id="adminRefreshBtn" class="btn" type="button">🔄 Refresh</button>
          </div>

          <div class="admin-controls">
            <input id="adminSearchInput" type="text" placeholder="Search by email, ticket ID, message..." />
            <select id="adminTypeFilter">
              <option value="all">All Types</option>
              <option value="support">Support</option>
              <option value="refund">Refund</option>
            </select>
            <select id="adminStatusFilter">
              <option value="all">All Status</option>
              <option value="open">Open</option>
              <option value="read">Read</option>
              <option value="replied">Replied</option>
              <option value="closed">Closed</option>
            </select>
            <button id="adminClearFiltersBtn" class="btn" type="button">Clear</button>
          </div>

          <div class="admin-stats">
            <div class="admin-stat-card">
              <div class="admin-stat-label">All Requests</div>
              <div id="statTotal" class="admin-stat-value">0</div>
            </div>
            <div class="admin-stat-card">
              <div class="admin-stat-label">Open</div>
              <div id="statOpen" class="admin-stat-value">0</div>
            </div>
            <div class="admin-stat-card">
              <div class="admin-stat-label">Read</div>
              <div id="statRead" class="admin-stat-value">0</div>
            </div>
            <div class="admin-stat-card">
              <div class="admin-stat-label">Support Tickets</div>
              <div id="statSupport" class="admin-stat-value">0</div>
            </div>
            <div class="admin-stat-card">
              <div class="admin-stat-label">Refund Requests</div>
              <div id="statRefund" class="admin-stat-value">0</div>
            </div>
          </div>
        </div>

        <div class="admin-grid">
          <section class="admin-panel">
            <h2 style="margin-top: 0;">All Requests</h2>
            <div id="adminList" class="admin-list">
              <div class="admin-detail-empty">Loading requests...</div>
            </div>
          </section>

          <section class="admin-panel">
            <h2 style="margin-top: 0;">Request Details</h2>
            <div id="adminDetail">
              <div class="admin-detail-empty">Select a request to view details.</div>
            </div>

            <div id="adminFeedback" class="admin-feedback"></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/firebase-client.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
