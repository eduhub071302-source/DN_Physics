<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | DN Physics</title>
  <link rel="stylesheet" href="/DN_Physics/css/style.css" />
</head>
<body>
  <div class="offline-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="offline-card" style="max-width:560px;width:100%;">
      <div class="offline-card-inner">
        <div class="offline-badge">Password Recovery</div>
        <h1 class="offline-title">Create a new password</h1>
        <p class="offline-text">Enter your new password below.</p>

        <div class="auth-box" style="width:100%;max-width:none;padding:0;background:none;border:none;box-shadow:none;">
          <div class="auth-password-wrap">
            <input id="newPassword" type="password" placeholder="New password" />
            <button id="toggleNewPasswordBtn" class="auth-eye-btn" type="button" aria-label="Show new password">
              <svg id="newEyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 5 12 5C19 5 23 12 23 12C23 12 19 19 12 19C5 19 1 12 1 12Z"
                  stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>

          <div class="auth-password-wrap" style="margin-top:10px;">
            <input id="confirmPassword" type="password" placeholder="Confirm password" />
            <button id="toggleConfirmPasswordBtn" class="auth-eye-btn" type="button" aria-label="Show confirm password">
              <svg id="confirmEyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 5 12 5C19 5 23 12 23 12C23 12 19 19 12 19C5 19 1 12 1 12Z"
                  stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>

          <button id="resetPasswordBtn" class="btn btn-primary" type="button">Update Password</button>
          <button id="goHomeBtn" class="btn" type="button">Go Home</button>
          <div id="resetMsg" style="margin-top:12px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/DN_Physics/js/supabase-client.js"></script>
  <script>
    const msg = document.getElementById("resetMsg");
    const btn = document.getElementById("resetPasswordBtn");
    const homeBtn = document.getElementById("goHomeBtn");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const toggleNewPasswordBtn = document.getElementById("toggleNewPasswordBtn");
    const toggleConfirmPasswordBtn = document.getElementById("toggleConfirmPasswordBtn");
    const newEyeIcon = document.getElementById("newEyeIcon");
    const confirmEyeIcon = document.getElementById("confirmEyeIcon");

    function showMsg(text, success = false) {
      msg.textContent = text;
      msg.style.color = success ? "#86efac" : "#ff6b6b";
      msg.style.fontSize = "14px";
      msg.style.lineHeight = "1.5";
    }

    function setEyeState(input, button, icon, show) {
      input.type = show ? "text" : "password";
      button.setAttribute("aria-label", show ? "Hide password" : "Show password");

      if (show) {
        icon.innerHTML = `
          <path d="M2 2L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9.88 5.09A10.94 10.94 0 0 1 12 4.9C19 4.9 23 12 23 12C22.39 13.43 21.55 14.72 20.53 15.85" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.71 6.72C4.42 8.18 2.74 10.35 1 12C1 12 5 19.1 12 19.1C13.8 19.1 15.46 18.63 16.94 17.82" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        `;
      } else {
        icon.innerHTML = `
          <path d="M1 12C1 12 5 5 12 5C19 5 23 12 23 12C23 12 19 19 12 19C5 19 1 12 1 12Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        `;
      }
    }

    toggleNewPasswordBtn.onclick = () => {
      setEyeState(newPassword, toggleNewPasswordBtn, newEyeIcon, newPassword.type === "password");
    };

    toggleConfirmPasswordBtn.onclick = () => {
      setEyeState(confirmPassword, toggleConfirmPasswordBtn, confirmEyeIcon, confirmPassword.type === "password");
    };

    homeBtn.onclick = () => {
      window.location.href = "/DN_Physics/index.html";
    };

    btn.onclick = async () => {
      const newPass = newPassword.value.trim();
      const confirmPass = confirmPassword.value.trim();

      if (!navigator.onLine) {
        showMsg("No internet connection. Please reconnect and try again.");
        return;
      }

      if (!newPass || !confirmPass) {
        showMsg("Please fill both password fields.");
        return;
      }

      if (newPass.length < 6) {
        showMsg("Password must be at least 6 characters.");
        return;
      }

      if (newPass !== confirmPass) {
        showMsg("Passwords do not match.");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: newPass
      });

      if (error) {
        showMsg(error.message || "Unable to update password.");
        return;
      }

      showMsg("✅ Password updated successfully. Returning to the app...", true);

      setTimeout(() => {
        window.location.href = "/DN_Physics/index.html";
      }, 1200);
    };
  </script>
</body>
</html>
