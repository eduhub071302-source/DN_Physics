<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | DN Physics</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4ea1ff" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link rel="stylesheet" href="/css/style.css" />

    <style>
      body {
        min-height: 100vh;
      }

      .reset-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 0;
      }

      .reset-wrap {
        width: min(92vw, 520px);
      }

      .reset-card {
        position: relative;
        overflow: hidden;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(124, 196, 255, 0.14);
        background:
          radial-gradient(circle at top right, rgba(78, 161, 255, 0.12), transparent 30%),
          linear-gradient(180deg, rgba(15, 23, 38, 0.97), rgba(10, 17, 29, 0.98));
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.34),
          0 0 0 1px rgba(255, 255, 255, 0.02);
      }

      .reset-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 6px 12px;
        margin-bottom: 14px;
        border-radius: 999px;
        background: rgba(78, 161, 255, 0.1);
        border: 1px solid rgba(124, 196, 255, 0.18);
        color: #dbeeff;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .reset-title {
        margin: 0 0 10px;
        font-size: clamp(2rem, 5vw, 2.8rem);
        line-height: 1.03;
        letter-spacing: -0.03em;
        color: #f5f8ff;
      }

      .reset-subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .reset-status {
        margin: 0 0 16px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        line-height: 1.6;
      }

      .reset-status.is-error {
        border-color: rgba(255, 107, 107, 0.2);
        background: rgba(255, 107, 107, 0.08);
        color: #ffb1b1;
      }

      .reset-status.is-success {
        border-color: rgba(34, 197, 94, 0.2);
        background: rgba(34, 197, 94, 0.08);
        color: #9df0b8;
      }

      .reset-form {
        display: grid;
        gap: 12px;
      }

      .reset-input-wrap {
        position: relative;
      }

      .reset-input {
        width: 100%;
        min-height: 52px;
        padding: 12px 52px 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #0d1625;
        color: #e8eefc;
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .reset-input:focus {
        border-color: rgba(78, 161, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(78, 161, 255, 0.12);
        background: #101b2d;
      }

      .reset-eye-btn {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        min-width: 38px;
        min-height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reset-eye-btn:hover {
        border-color: rgba(124, 196, 255, 0.24);
        color: #eef5ff;
        background: rgba(78, 161, 255, 0.08);
      }

      .reset-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 6px;
      }

      .reset-helper {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.65;
      }

      .reset-brand {
        margin-bottom: 18px;
        text-align: center;
        color: #cfe5ff;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .reset-brand span {
        color: var(--accent-2);
      }

      @media (max-width: 600px) {
        .reset-card {
          padding: 18px;
          border-radius: 20px;
        }

        .reset-actions {
          flex-direction: column;
        }

        .reset-actions .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="reset-shell">
      <div class="reset-wrap">
        <div class="reset-brand">DN Physics</div>

        <section class="reset-card">
          <div class="reset-badge">Password Reset</div>
          <h1 class="reset-title">Create a new password</h1>
          <p class="reset-subtitle">
            Set a new password for your account, then return to the app and log in again.
          </p>

          <div id="resetStatus" class="reset-status">
            Verifying your secure reset link...
          </div>

          <form id="resetForm" class="reset-form hidden">
            <div class="reset-input-wrap">
              <input
                id="newPassword"
                class="reset-input"
                type="password"
                placeholder="New password"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button
                id="toggleNewPassword"
                class="reset-eye-btn"
                type="button"
                aria-label="Show password"
              >
                👁
              </button>
            </div>

            <div class="reset-input-wrap">
              <input
                id="confirmPassword"
                class="reset-input"
                type="password"
                placeholder="Confirm new password"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button
                id="toggleConfirmPassword"
                class="reset-eye-btn"
                type="button"
                aria-label="Show confirm password"
              >
                👁
              </button>
            </div>

            <div class="reset-actions">
              <button id="resetSubmitBtn" class="btn btn-primary" type="submit">
                Update Password
              </button>
              <a class="btn" href="/index.html">Back to App</a>
            </div>
          </form>

          <div id="successActions" class="reset-actions hidden">
            <a id="backToLoginBtn" class="btn btn-primary" href="/index.html?auth=login">
              Return to App Login
            </a>
            <a class="btn" href="/index.html">Go to Home</a>
          </div>

          <p class="reset-helper">
            This page is secured by Firebase and your app configuration.
          </p>
        </section>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
      import {
        getAuth,
        verifyPasswordResetCode,
        confirmPasswordReset,
      } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA8MHkxCeD1hUkPFZA15mUpaB87B21ZZ04",
        authDomain: "dn-physics.firebaseapp.com",
        databaseURL:
          "https://dn-physics-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dn-physics",
        storageBucket: "dn-physics.firebasestorage.app",
        messagingSenderId: "550016753421",
        appId: "1:550016753421:web:8c68d2471cb87192809a44",
        measurementId: "G-JB216F8CQ9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const resetStatus = document.getElementById("resetStatus");
      const resetForm = document.getElementById("resetForm");
      const successActions = document.getElementById("successActions");
      const resetSubmitBtn = document.getElementById("resetSubmitBtn");

      const newPassword = document.getElementById("newPassword");
      const confirmPassword = document.getElementById("confirmPassword");

      const toggleNewPassword = document.getElementById("toggleNewPassword");
      const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

      const url = new URL(window.location.href);
      const mode = url.searchParams.get("mode");
      const oobCode = url.searchParams.get("oobCode");

      function setStatus(message, variant = "") {
        resetStatus.textContent = message;
        resetStatus.className = "reset-status";
        if (variant === "error") resetStatus.classList.add("is-error");
        if (variant === "success") resetStatus.classList.add("is-success");
      }

      function setPasswordVisibility(input, button) {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        button.setAttribute("aria-label", show ? "Hide password" : "Show password");
        button.textContent = show ? "🙈" : "👁";
      }

      toggleNewPassword.addEventListener("click", () => {
        setPasswordVisibility(newPassword, toggleNewPassword);
      });

      toggleConfirmPassword.addEventListener("click", () => {
        setPasswordVisibility(confirmPassword, toggleConfirmPassword);
      });

      async function initResetPage() {
        if (mode !== "resetPassword" || !oobCode) {
          setStatus(
            "This reset link is invalid. Please request a new password reset email.",
            "error",
          );
          return;
        }

        try {
          await verifyPasswordResetCode(auth, oobCode);
          setStatus("Your reset link is verified. Enter your new password below.");
          resetForm.classList.remove("hidden");
          newPassword.focus();
        } catch (error) {
          console.error("Reset link verification failed:", error);
          setStatus(
            "This reset link is expired or invalid. Please request a new password reset email.",
            "error",
          );
        }
      }

      resetForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = String(newPassword.value || "").trim();
        const confirm = String(confirmPassword.value || "").trim();

        if (!password || !confirm) {
          setStatus("Please fill both password fields.", "error");
          return;
        }

        if (password.length < 6) {
          setStatus("Password must be at least 6 characters.", "error");
          return;
        }

        if (password !== confirm) {
          setStatus("Passwords do not match.", "error");
          return;
        }

        resetSubmitBtn.disabled = true;
        resetSubmitBtn.textContent = "Updating...";

        try {
          await confirmPasswordReset(auth, oobCode, password);

          setStatus(
            "✅ Password updated successfully. Return to the app and log in with your new password.",
            "success",
          );

          resetForm.classList.add("hidden");
          successActions.classList.remove("hidden");
        } catch (error) {
          console.error("Password reset failed:", error);
          setStatus(
            "Unable to update your password. Please request a new reset email and try again.",
            "error",
          );
        } finally {
          resetSubmitBtn.disabled = false;
          resetSubmitBtn.textContent = "Update Password";
        }
      });

      initResetPage();
      <script src="/js/app-config.js"></script>
      <script type="module" src="/js/firebase-client.js"></script>
      <script src="/js/theme-manager.js"></script>
      <script>
        window.addEventListener("load", () => {
          window.dnThemeApplyToCurrentPage?.();
        });
      </script>
    </script>
  </body>
</html>
