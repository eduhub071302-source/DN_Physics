<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="/DN_Physics/css/style.css">
</head>
<body>

<div class="auth-box" style="max-width:400px;margin:100px auto;">
  <h2>Reset Password</h2>

  <input id="newPassword" type="password" placeholder="New Password" />

  <button id="resetBtn" class="btn btn-primary">Update Password</button>

  <p id="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/DN_Physics/js/supabase-client.js"></script>

<script>
document.getElementById("resetBtn").onclick = async () => {
  const password = document.getElementById("newPassword").value;

  const { error } = await supabaseClient.auth.updateUser({
    password: password
  });

  if (error) {
    document.getElementById("msg").textContent = "Failed to update password";
  } else {
    document.getElementById("msg").textContent = "✅ Password updated successfully";
  }
};
</script>

</body>
</html>
