<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes | DN Physics</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4ea1ff" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="brand">DN Physics</div>

      <div class="topbar-right">
        <nav class="nav-links" aria-label="Notes navigation">
          <a href="/index.html">Home</a>
          <a href="/notes/index.html" class="active">Notes</a>
        </nav>

        <button
          id="refreshBtn"
          class="btn refresh-top-btn"
          type="button"
          title="Refresh page"
          aria-label="Refresh page"
        >
          🔄
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero notes-hero" style="padding: 52px 0 36px;">
      <div class="container">
        <a href="/index.html" class="mobile-home-back-btn" aria-label="Back to home">
          ← Back to Home
        </a>

        <div class="badge">Notes Library</div>
        <h1 style="font-size: clamp(28px, 5vw, 42px);">📚 Explore Notes</h1>
        <p>Choose a category to open Physics, Main Maths, or Basic Maths notes.</p>
      </div>
    </section>

    <section class="section pinned-section is-hidden" id="pinnedSection">
      <div class="container">
        <h2 style="font-size: clamp(22px, 4vw, 30px);">Pinned Categories</h2>
        <div class="grid" id="pinnedGrid"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 style="font-size: clamp(24px, 4.5vw, 34px);">All Categories</h2>

        <div class="grid" id="subjectGrid">
          <div class="empty-state">Loading categories...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center;">
      <div>© 2026 DN Physics</div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms</a>
        <a href="/contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <div class="music-player-wrap">
    <button
      id="musicToggleBtn"
      class="btn music-toggle-btn"
      type="button"
      aria-expanded="false"
      aria-controls="musicPanel"
    >
      🎧 Focus
    </button>

    <div id="musicPanel" class="music-panel" aria-hidden="true">
      <div class="music-panel-title">🎧 Deep Focus Mode</div>

      <label for="trackSelect" class="music-label">Select Track</label>
      <select id="trackSelect" class="music-select"></select>

      <div class="music-controls">
        <button id="playPauseBtn" class="btn btn-primary" type="button">▶ Play</button>
        <button id="stopMusicBtn" class="btn" type="button">■ Stop</button>
      </div>

      <label for="volumeSlider" class="music-label">Volume 🔊</label>
      <input
        id="volumeSlider"
        class="volume-slider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.35"
      />

      <div id="currentTrackLabel" class="music-track-label">Current: None</div>
    </div>
  </div>

  <audio id="bgMusic" loop></audio>

  <script src="/js/app-config.js"></script>
  <script src="/js/theme-manager.js"></script>
  <script>
    window.dnThemeApplyToCurrentPage?.();
  </script>
  <script type="module" src="/js/firebase-client.js"></script>
  <script type="module" src="/js/pdf-sync.js"></script>
  <script src="/js/access-control.js"></script>
  <script type="module" src="/js/unlock.js"></script>

  <script>
    const refreshBtn = document.getElementById("refreshBtn");
    const pinnedSection = document.getElementById("pinnedSection");
    const pinnedGrid = document.getElementById("pinnedGrid");
    const subjectGrid = document.getElementById("subjectGrid");

    let SUBJECTS = {};
    let pinButtons = [];

    function prettifyLabel(name) {
      return (name || "")
        .replace(/-/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase())
        .trim();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getStreamDescription(streamSlug) {
      const descriptions = {
        "physics": "Open Physics note topics and formula sheets.",
        "main-maths": "Open Main Maths note topics and revision sheets.",
        "basic-maths": "Open Basic Maths notes, including Algebra and Geometry."
      };

      return descriptions[streamSlug] || "Explore topics inside this category.";
    }

    function getBadgeText(index) {
      return `Category ${String(index + 1).padStart(2, "0")}`;
    }

    function getCurrentUserId() {
      try {
        const firebaseUid = window.firebaseAuth?.currentUser?.uid;
        if (firebaseUid) return firebaseUid;

        const cachedUser = JSON.parse(localStorage.getItem("dn_user") || "null");
        if (cachedUser?.id) return cachedUser.id;
      } catch (error) {
        console.warn("Could not resolve current user id:", error);
      }

      return "guest";
    }

    function getPinnedSubjectsKey() {
      return `dnPhysicsPinnedSubjects_${getCurrentUserId()}`;
    }

    function getPinnedSubjects() {
      if (typeof window.dnPdfGetPinnedSubjects === "function") {
        return window.dnPdfGetPinnedSubjects();
      }

      try {
        return JSON.parse(localStorage.getItem(getPinnedSubjectsKey())) || [];
      } catch {
        return [];
      }
    }

    async function savePinnedSubjects(items) {
      if (typeof window.dnPdfSetPinnedSubjects === "function") {
        await window.dnPdfSetPinnedSubjects(items);
        return;
      }

      localStorage.setItem(getPinnedSubjectsKey(), JSON.stringify(items));
    }

    async function togglePin(subjectName) {
      const pinned = getPinnedSubjects();
      const exists = pinned.includes(subjectName);

      const updated = exists
        ? pinned.filter((name) => name !== subjectName)
        : [...pinned, subjectName];

      await savePinnedSubjects(updated);
      updatePinButtons();
      renderPinnedSubjects();
    }

    function updatePinButtons() {
      const pinned = getPinnedSubjects();

      pinButtons.forEach((button) => {
        const subjectName = button.dataset.subject;
        const isPinned = pinned.includes(subjectName);

        button.textContent = isPinned ? "★" : "☆";
        button.classList.toggle("pinned", isPinned);
        button.setAttribute(
          "aria-label",
          isPinned ? `Unpin ${subjectName}` : `Pin ${subjectName}`
        );
        button.title = isPinned ? "Unpin category" : "Pin category";
      });
    }

    function createPinnedCard(subject) {
      const wrapper = document.createElement("div");
      wrapper.className = "card";

      const top = document.createElement("div");
      top.className = "card-top";

      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = subject.badge;

      const pinBtn = document.createElement("button");
      pinBtn.className = "pin-btn pinned";
      pinBtn.type = "button";
      pinBtn.textContent = "★";
      pinBtn.dataset.subject = subject.title;
      pinBtn.setAttribute("aria-label", `Unpin ${subject.title}`);
      pinBtn.title = "Unpin category";
      pinBtn.addEventListener("click", async () => {
        await togglePin(subject.title);
      });

      top.appendChild(badge);
      top.appendChild(pinBtn);

      const title = document.createElement("h3");
      title.textContent = subject.title;

      const desc = document.createElement("p");
      desc.textContent = subject.description;

      wrapper.appendChild(top);
      wrapper.appendChild(title);
      wrapper.appendChild(desc);

      const actions = document.createElement("div");
      actions.className = "actions";

      const link = document.createElement("a");
      link.className = "btn";
      link.href = subject.link;
      link.textContent = "Explore";

      actions.appendChild(link);
      wrapper.appendChild(actions);

      return wrapper;
    }

    function renderPinnedSubjects() {
      const pinned = getPinnedSubjects();
      pinnedGrid.innerHTML = "";

      if (pinned.length === 0) {
        pinnedSection.classList.add("is-hidden");
        return;
      }

      pinned.forEach((name) => {
        const subject = SUBJECTS[name];
        if (subject) {
          pinnedGrid.appendChild(createPinnedCard(subject));
        }
      });

      pinnedSection.classList.remove("is-hidden");
    }

    function rebuildPins() {
      pinButtons = Array.from(document.querySelectorAll(".pin-btn"));

      pinButtons.forEach((button) => {
        button.addEventListener("click", async () => {
          await togglePin(button.dataset.subject);
        });
      });

      updatePinButtons();
      renderPinnedSubjects();
    }

    async function loadSubjectsFromCatalog() {
      try {
        const res = await fetch("/pdfs/catalog.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load catalog");

        const items = await res.json();
        const uniqueStreams = [...new Set(items.map((item) => item.stream).filter(Boolean))];

        if (!uniqueStreams.length) {
          subjectGrid.innerHTML = `<div class="empty-state">No categories found.</div>`;
          return;
        }

        SUBJECTS = {};

        subjectGrid.innerHTML = uniqueStreams.map((streamSlug, index) => {
          const streamName = prettifyLabel(streamSlug);
          const description = getStreamDescription(streamSlug);
          const badge = getBadgeText(index);
          const link = `/subjects/index.html?stream=${encodeURIComponent(streamSlug)}`;

          SUBJECTS[streamName] = {
            title: streamName,
            badge,
            description,
            link,
            allowed: true
          };

          return `
            <div class="card subject-card">
              <div class="card-top">
                <div class="badge">${badge}</div>
                <button class="pin-btn" data-subject="${escapeHtml(streamName)}" type="button" aria-label="Pin ${escapeHtml(streamName)}">
                  ☆
                </button>
              </div>
              <h3>${escapeHtml(streamName)}</h3>
              <p>${escapeHtml(description)}</p>
              <div class="actions">
                <a class="btn" href="${link}">
                  Explore
                </a>
              </div>
            </div>
          `;
        }).join("");

        rebuildPins();
      } catch (error) {
        console.error(error);
        subjectGrid.innerHTML = `<div class="empty-state">Could not load categories.</div>`;
      }
    }

    refreshBtn.addEventListener("click", async () => {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.update();
          }
        }
      } catch (error) {
        console.log("Refresh warning:", error);
      }

      location.reload();
    });

    loadSubjectsFromCatalog();
  </script>

  <script src="/js/music-player.js"></script>
</body>
</html>
