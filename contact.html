<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | DN Physics</title>
  <meta name="theme-color" content="#4ea1ff" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .support-shell {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }
    .support-panel {
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(17, 26, 43, 0.96), rgba(12, 18, 31, 0.98));
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 44px rgba(0,0,0,0.24);
    }
    .support-form-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .support-form-grid input,
    .support-form-grid select,
    .support-form-grid textarea {
      width: 100%;
      min-height: 50px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }
    .support-form-grid select {
      background: linear-gradient(180deg, rgba(17, 26, 43, 0.98), rgba(12, 18, 31, 0.98));
      color: #e8eefc;
    }
    .support-form-grid select option {
      background: #101827;
      color: #e8eefc;
    }
    .support-form-grid textarea {
      min-height: 150px;
      resize: vertical;
    }
    .support-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }
    .support-actions .btn {
      flex: 1 1 180px;
    }
    .support-feedback {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 700;
      display: none;
    }
    .support-feedback.show { display: block; }
    .support-feedback.success {
      background: rgba(76, 175, 80, 0.12);
      border: 1px solid rgba(76, 175, 80, 0.24);
      color: #a5efaa;
    }
    .support-feedback.error {
      background: rgba(244, 67, 54, 0.12);
      border: 1px solid rgba(244, 67, 54, 0.24);
      color: #ffb3ad;
    }
    .history-dropdown {
      margin-top: 18px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }
    .history-toggle {
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: transparent;
      color: #eef5ff;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
      text-align: left;
    }
    .history-toggle-icon {
      transition: transform 0.2s ease;
      font-size: 1rem;
      opacity: 0.9;
    }
    .history-dropdown.open .history-toggle-icon { transform: rotate(180deg); }
    .history-content {
      display: none;
      padding: 0 16px 16px;
    }
    .history-dropdown.open .history-content { display: block; }
    .ticket-history-list {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }
    .ticket-history-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .ticket-history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .ticket-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
    }
    .ticket-status.open {
      background: rgba(255, 152, 0, 0.12);
      color: #ffcc80;
      border: 1px solid rgba(255, 152, 0, 0.24);
    }
    .ticket-status.read {
      background: rgba(155, 89, 182, 0.12);
      color: #d7b7ff;
      border: 1px solid rgba(155, 89, 182, 0.24);
    }
    .ticket-status.replied {
      background: rgba(78, 161, 255, 0.12);
      color: #9fd0ff;
      border: 1px solid rgba(78, 161, 255, 0.24);
    }
    .ticket-status.closed {
      background: rgba(76, 175, 80, 0.12);
      color: #9be7a0;
      border: 1px solid rgba(76, 175, 80, 0.24);
    }
    .contact-direct-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="brand">DinuuNOVA</div>
      <nav class="nav-links" aria-label="Contact navigation">
        <a href="/index.html">Home</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <a href="/index.html" class="back-link">← Back to Home</a>

      <div class="badge">Support & Contact</div>

      <div class="topic-card fade-slide-up" style="padding: 28px;">
        <h1 style="margin-top: 0;">Contact Support</h1>
        <p class="section-sub" style="margin-bottom: 22px;">
          Need help? Send a support request and track your status.
        </p>

        <div class="support-shell">
          <div class="support-panel">
            <h2 style="margin-top: 0;">Send a Ticket</h2>

            <form id="supportForm" class="support-form-grid">
              <input id="supportName" type="text" placeholder="Name" required />
              <input id="supportEmail" type="email" placeholder="Email" required />

              <select id="supportCategory" required>
                <option value="">Select Category</option>
                <option value="general-support">General Support</option>
                <option value="account-help">Account Help</option>
                <option value="payment-help">Payment Help</option>
                <option value="bug-report">Bug Report</option>
                <option value="feature-request">Feature Request</option>
              </select>

              <textarea id="supportMessage" placeholder="Describe your issue..." required></textarea>
              <div class="support-actions">
                <button id="supportSubmitBtn" class="btn btn-primary" type="submit">📩 Submit Ticket</button>
                <a class="btn" href="mailto:eduhub071302@gmail.com?subject=DN%20Physics%20Support">✉ Email Support</a>
              </div>
            </form>

            <div id="supportFeedback" class="support-feedback"></div>
          </div>

          <div class="history-dropdown" id="ticketHistoryDropdown">
            <button id="ticketHistoryToggle" class="history-toggle" type="button">
              <span>Recent Ticket</span>
              <span class="history-toggle-icon">⌄</span>
            </button>

            <div class="history-content">
              <div id="ticketHistoryList" class="ticket-history-list">
                <div class="ticket-history-item">
                  <div class="ticket-history-top">
                    <strong>No tickets yet</strong>
                    <span class="ticket-status open">Ready</span>
                  </div>
                  <div class="muted-text">Your tickets will appear here.</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="contact-direct-box">
          <h2 style="margin-top: 0;">Contact Info</h2>
          <p><strong>Email:</strong> eduhub071302@gmail.com</p>
          <p><strong>Response time:</strong> 24–48 hours</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/firebase-client.js"></script>
  <script>
    const SUPPORT_STORAGE_KEY = "dn_support_ticket_history";

    function getFirebaseUser() {
      return window.firebaseAuth?.currentUser || null;
    }

    function getStoredUser() {
      try {
        return JSON.parse(localStorage.getItem("dn_user") || "null");
      } catch {
        return null;
      }
    }

    function getCurrentUserId() {
      return getFirebaseUser()?.uid || getStoredUser()?.id || "";
    }

    function getSupportTickets() {
      try {
        return JSON.parse(localStorage.getItem(SUPPORT_STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveSupportTickets(items) {
      try {
        localStorage.setItem(SUPPORT_STORAGE_KEY, JSON.stringify(items || []));
      } catch (error) {
        console.warn("Could not save support history:", error);
      }
    }

    function normalizeStatus(value) {
      const v = String(value || "").toLowerCase();
      if (v === "read" || v === "replied" || v === "closed") return v;
      return "open";
    }

    function formatStatusLabel(status) {
      if (status === "read") return "Read";
      if (status === "replied") return "Replied";
      if (status === "closed") return "Closed";
      return "Open";
    }

    function renderTicketHistory(items = null) {
      const list = document.getElementById("ticketHistoryList");
      if (!list) return;

      const tickets = Array.isArray(items) ? items : getSupportTickets();

      if (!tickets.length) {
        list.innerHTML = `
          <div class="ticket-history-item">
            <div class="ticket-history-top">
              <strong>No tickets yet</strong>
              <span class="ticket-status open">Ready</span>
            </div>
            <div class="muted-text">Submitted support tickets will appear here.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = tickets
        .slice()
        .reverse()
        .map((ticket) => {
          const status = normalizeStatus(ticket.status);
          const statusLabel = ticket.statusLabel || formatStatusLabel(status);

          return `
            <div class="ticket-history-item">
              <div class="ticket-history-top">
                <strong>${ticket.categoryLabel}</strong>
                <span class="ticket-status ${status}">${statusLabel}</span>
              </div>
              <div>${ticket.message}</div>
              <small>Ticket ID: ${ticket.id}</small><br>
              <small>Submitted: ${ticket.createdAt}</small>
            </div>
          `;
        })
        .join("");
    }

    async function pullSupportHistoryFromFirebase() {
      try {
        const db = window.firebaseDb || null;
        const sdk = window.firebaseSdk || null;
        const uid = getCurrentUserId();

        if (!db || !sdk?.ref || !sdk?.get || !uid) {
          renderTicketHistory();
          return;
        }

        const snapshot = await sdk.get(sdk.ref(db, `user_support_messages/${uid}`));
        const all = snapshot.exists() ? (snapshot.val() || {}) : {};

        const mine = Object.entries(all)
          .map(([id, item]) => ({ id, ...(item || {}) }))
          .sort((a, b) => {
            const aTime = new Date(a.createdAt || 0).getTime() || 0;
            const bTime = new Date(b.createdAt || 0).getTime() || 0;
            return bTime - aTime;
          });

        saveSupportTickets(mine);
        renderTicketHistory(mine);
      } catch (error) {
        console.warn("Could not pull support history from Firebase:", error);
        renderTicketHistory();
      }
    }

    function showSupportFeedback(message, type = "success") {
      const box = document.getElementById("supportFeedback");
      if (!box) return;
      box.className = `support-feedback show ${type}`;
      box.textContent = message;
    }

    function buildCategoryLabel(value) {
      const map = {
        "general-support": "General Support",
        "account-help": "Account Help",
        "payment-help": "Payment Help",
        "bug-report": "Bug Report",
        "feature-request": "Feature Request",
      };
      return map[value] || "Support";
    }

    function generateTicketId() {
      return `TICKET-${Date.now()}-${Math.floor(Math.random() * 900 + 100)}`;
    }

    async function submitSupportTicket(event) {
      event.preventDefault();

      const submitBtn = document.getElementById("supportSubmitBtn");
      const nameInput = document.getElementById("supportName");
      const emailInput = document.getElementById("supportEmail");
      const categoryInput = document.getElementById("supportCategory");
      const messageInput = document.getElementById("supportMessage");

      const uid = getCurrentUserId();

      const payload = {
        id: generateTicketId(),
        uid,
        name: String(nameInput?.value || "").trim(),
        email: String(emailInput?.value || "").trim(),
        category: String(categoryInput?.value || "").trim(),
        categoryLabel: buildCategoryLabel(categoryInput?.value || ""),
        message: String(messageInput?.value || "").trim(),
        status: "open",
        statusLabel: "Open",
        createdAt: new Date().toLocaleString(),
      };

      if (!uid) {
        showSupportFeedback("Please log in before sending a support request.", "error");
        return;
      }

      if (!payload.name || !payload.email || !payload.category || !payload.message) {
        showSupportFeedback("Please fill all fields before submitting.", "error");
        return;
      }

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";
      }

      try {
        const db = window.firebaseDb || null;
        const sdk = window.firebaseSdk || null;

        if (db && sdk?.ref && sdk?.set) {
          await sdk.set(sdk.ref(db, `support_messages/${payload.id}`), payload);
          await sdk.set(sdk.ref(db, `user_support_messages/${uid}/${payload.id}`), payload);
        }

        const existing = getSupportTickets();
        existing.push(payload);
        saveSupportTickets(existing);

        await pullSupportHistoryFromFirebase();
        showSupportFeedback("Support ticket submitted successfully.", "success");
        event.target.reset();
      } catch (error) {
        console.error("Support submit failed:", error);
        showSupportFeedback("Could not submit support ticket right now.", "error");
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "📩 Submit Ticket";
        }
      }
    }

    document.getElementById("supportForm")?.addEventListener("submit", submitSupportTicket);

    document.getElementById("ticketHistoryToggle")?.addEventListener("click", async () => {
      document.getElementById("ticketHistoryDropdown")?.classList.toggle("open");
      await pullSupportHistoryFromFirebase();
    });

    renderTicketHistory();
    window.addEventListener("load", () => {
      pullSupportHistoryFromFirebase();
    });
  </script>
</body>
</html>
