<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled | DinuuNOVA</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="section">
    <div class="container">
      <div class="card" style="max-width:700px; margin:40px auto; text-align:center;">
        <div style="font-size:32px; margin-bottom:12px; color:#ff8a8a; font-weight:700;">Cancelled</div>

        <h1>Payment Cancelled</h1>
        <p>Your payment was cancelled or not completed.</p>

        <p style="margin-top:10px; color:#a8b3cf; font-size:14px;">
          No charges were applied. You can try again anytime.
        </p>

        <div
          id="orderInfo"
          style="margin-top:10px; font-size:13px; color:#7cc4ff;"
        ></div>

        <div
          class="actions"
          style="margin-top:20px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;"
        >
          <button id="retryBtn" class="btn btn-primary" type="button">
            🔁 Try Again
          </button>

          <a class="btn" href="/index.html">
            🏠 Back to Home
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/app-config.js"></script>
  <script type="module" src="/js/unlock.js"></script>

  <script>
    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      const orderInfo = document.getElementById("orderInfo");
      const retryBtn = document.getElementById("retryBtn");

      let orderId = "";

      try {
        orderId =
          params.get("order_id") ||
          params.get("orderId") ||
          params.get("merchant_id") ||
          (typeof getPendingOrderId === "function" ? getPendingOrderId() : "") ||
          "";
      } catch {
        orderId = "";
      }

      try {
        if (typeof clearPendingOrderId === "function") {
          clearPendingOrderId();
        }
      } catch (error) {
        console.warn("Could not clear pending order id:", error);
      }

      if (orderId && orderInfo) {
        orderInfo.textContent = "Order ID: " + orderId;
      }

      if (retryBtn) {
        retryBtn.addEventListener("click", async () => {
          try {
            if (typeof startFullUnlockCheckout !== "function") {
              alert("Payment system is not ready yet. Please return home and try again.");
              return;
            }

            retryBtn.disabled = true;
            retryBtn.textContent = "Starting...";

            await startFullUnlockCheckout();
          } catch (e) {
            console.log("Retry failed:", e);
            alert("Unable to start payment right now. Please try again.");
          } finally {
            retryBtn.disabled = false;
            retryBtn.textContent = "🔁 Try Again";
          }
        });
      }
    });
  </script>
</body>
</html>
