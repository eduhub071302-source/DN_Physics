<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
<defs>
<radialGradient id="g2">
<stop offset="0%" stop-color="#00ffcc">
<animate attributeName="stop-color" values="#00ffcc;#ff00cc;#00ffcc" dur="12s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#0000ff">
<animate attributeName="stop-color" values="#0000ff;#ff8800;#0000ff" dur="12s" repeatCount="indefinite"/>
</stop>
</radialGradient>
<filter id="glow"><feGaussianBlur stdDeviation="25"/></filter>
</defs>
<rect width="100%" height="100%" fill="black"/>
<ellipse cx="50%" cy="50%" rx="400" ry="200" fill="url(#g2)" filter="url(#glow)">
<animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="20s" repeatCount="indefinite"/>
</ellipse>
</svg>