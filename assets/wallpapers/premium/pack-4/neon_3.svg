<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
<defs>
<linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ff00ff">
<animate attributeName="stop-color" values="#ff00ff;#00ffff;#ff00ff" dur="10s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#00ffff">
<animate attributeName="stop-color" values="#00ffff;#ff00ff;#00ffff" dur="10s" repeatCount="indefinite"/>
</stop>
</linearGradient>
<filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
</defs>
<rect width="100%" height="100%" fill="black"/>
<circle cx="50%" cy="50%" r="300" fill="url(#g1)" filter="url(#blur)">
<animate attributeName="r" values="280;320;280" dur="8s" repeatCount="indefinite"/>
</circle>
</svg>