<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated neon cyber grid pulse background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070017"/>
      <stop offset="55%" stop-color="#16003c"/>
      <stop offset="100%" stop-color="#001f2f"/>
      <animate attributeName="stop-color" values="#070017;#001c35;#170032;#070017" dur="25s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00efff"/>
      <stop offset="50%" stop-color="#ff00ea"/>
      <stop offset="100%" stop-color="#00ff88"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#00eaff" stroke-width="2" stroke-opacity="0.32"/>
    </pattern>
    <filter id="neon"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <circle cx="960" cy="500" r="230" fill="none" stroke="url(#horizon)" stroke-width="14" filter="url(#neon)" opacity="0.85">
    <animate attributeName="r" values="210;270;210" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;1;0.55" dur="8s" repeatCount="indefinite"/>
  </circle>
  <rect x="0" y="560" width="1920" height="520" fill="url(#grid)" transform="skewY(-8) scale(1 1.25)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 120;0 0" dur="9s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <line x1="0" y1="560" x2="1920" y2="560" stroke="url(#horizon)" stroke-width="8" filter="url(#neon)" opacity="0.9"/>
  <rect width="1920" height="1080" fill="url(#horizon)" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.12;0.04" dur="10s" repeatCount="indefinite"/>
  </rect>
</svg>
