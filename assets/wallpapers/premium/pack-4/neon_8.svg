<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated smooth neon prismatic orbs background">
  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <radialGradient id="base" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#17133d"><animate attributeName="stop-color" values="#17133d;#2a064f;#053b4d;#281600;#17133d" dur="30s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#020008"><animate attributeName="stop-color" values="#020008;#000a13;#10001a;#00100d;#020008" dur="34s" repeatCount="indefinite"/></stop>
    </radialGradient>
    <radialGradient id="orb1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#00fff0" stop-opacity="1"><animate attributeName="stop-color" values="#00fff0;#ff00ee;#d8ff00;#00fff0" dur="17s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#00fff0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="55%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#ff2bd6" stop-opacity=".95"><animate attributeName="stop-color" values="#ff2bd6;#00a6ff;#ff7a00;#ff2bd6" dur="21s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#b6ff00" stop-opacity=".9"><animate attributeName="stop-color" values="#b6ff00;#00ffc8;#9b5cff;#b6ff00" dur="24s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#b6ff00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <g filter="url(#softGlow)" opacity=".95">
    <circle cx="320" cy="260" r="250" fill="url(#orb1)">
      <animate attributeName="cx" values="260;520;340;260" dur="32s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="210;360;680;210" dur="36s" repeatCount="indefinite"/>
      <animate attributeName="r" values="230;340;260;230" dur="28s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1190" cy="300" r="310" fill="url(#orb2)">
      <animate attributeName="cx" values="1190;930;1320;1190" dur="37s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300;620;180;300" dur="33s" repeatCount="indefinite"/>
      <animate attributeName="r" values="310;230;380;310" dur="31s" repeatCount="indefinite"/>
    </circle>
    <circle cx="790" cy="690" r="300" fill="url(#orb3)">
      <animate attributeName="cx" values="790;1020;560;790" dur="40s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="690;520;760;690" dur="35s" repeatCount="indefinite"/>
      <animate attributeName="r" values="300;420;260;300" dur="29s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect width="1600" height="900" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
</svg>
