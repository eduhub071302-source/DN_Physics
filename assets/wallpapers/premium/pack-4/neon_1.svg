<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
<defs>
<radialGradient id="spaceGrad">
<stop offset="0%">
<animate attributeName="stop-color" values="#ff00ff;#00ffff;#8800ff;#ff00ff" dur="20s" repeatCount="indefinite"/>
</stop>
<stop offset="100%">
<animate attributeName="stop-color" values="#000011;#000000;#000022;#000011" dur="20s" repeatCount="indefinite"/>
</stop>
</radialGradient>
<filter id="spaceBlur"><feGaussianBlur stdDeviation="50"/></filter>
</defs>
<rect width="100%" height="100%" fill="black"/>
<circle cx="50%" cy="50%" r="300" fill="url(#spaceGrad)" filter="url(#spaceBlur)">
<animate attributeName="r" values="260;340;260" dur="12s" repeatCount="indefinite"/>
</circle>
<g fill="white">
<circle cx="100" cy="100" r="2"/>
<circle cx="300" cy="200" r="1.5"/>
<circle cx="500" cy="150" r="2"/>
<circle cx="700" cy="300" r="1.5"/>
<circle cx="200" cy="500" r="2"/>
</g>
</svg>