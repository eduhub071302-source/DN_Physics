<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated neon aurora waves background">
  <defs>
    <radialGradient id="g1" cx="20%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#00ffe7">
        <animate attributeName="stop-color" values="#00ffe7;#9d4dff;#ff2bd6;#00ffe7" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#16164a"/>
      <stop offset="100%" stop-color="#03000d"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#b400ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff008c" stop-opacity="0.95"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="32s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <g filter="url(#glow)" opacity="0.9">
    <path d="M-150 690 C260 460 450 840 840 610 S1430 330 2100 540 V1180 H-150Z" fill="url(#wave)">
      <animate attributeName="d" dur="20s" repeatCount="indefinite" values="M-150 690 C260 460 450 840 840 610 S1430 330 2100 540 V1180 H-150Z;M-150 560 C260 820 520 390 910 610 S1510 910 2100 470 V1180 H-150Z;M-150 690 C260 460 450 840 840 610 S1430 330 2100 540 V1180 H-150Z"/>
    </path>
    <path d="M-200 320 C250 140 550 420 950 260 S1520 120 2120 300" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.22">
      <animate attributeName="d" dur="24s" repeatCount="indefinite" values="M-200 320 C250 140 550 420 950 260 S1520 120 2120 300;M-200 390 C250 610 620 160 1020 320 S1580 560 2120 250;M-200 320 C250 140 550 420 950 260 S1520 120 2120 300"/>
    </path>
  </g>
</svg>
