<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced neon relativity spacetime animated background">
<!-- Responsive animated SVG background: scales for mobile and desktop. -->
<defs>
  <linearGradient id="spaceBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#02000f"><animate attributeName="stop-color" values="#02000f;#00172b;#12002e;#02000f" dur="24s" repeatCount="indefinite"/></stop>
    <stop offset="100%" stop-color="#000000"/>
  </linearGradient>
  <radialGradient id="massGlow">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="18%" stop-color="#fffb00"/>
    <stop offset="48%" stop-color="#ff0077"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="gridStroke">
    <stop offset="0%" stop-color="#00f7ff"/>
    <stop offset="50%" stop-color="#ff00d4"/>
    <stop offset="100%" stop-color="#ffe600"/>
    <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="16s" repeatCount="indefinite"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="1200" height="800" fill="url(#spaceBg)"/>

<g transform="translate(600 430)" stroke="url(#gridStroke)" stroke-width="1.8" fill="none" opacity=".62" filter="url(#glow)">
  <g>
    <path d="M-620,-260 C-360,-120 360,-120 620,-260"/>
    <path d="M-640,-170 C-360,-30 360,-30 640,-170"/>
    <path d="M-660,-70 C-370,70 370,70 660,-70"/>
    <path d="M-680,40 C-380,180 380,180 680,40"/>
    <path d="M-700,170 C-400,300 400,300 700,170"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 18;0 0" dur="7s" repeatCount="indefinite"/>
  </g>
  <g>
    <path d="M-520,-300 C-310,-30 -310,260 -520,350"/>
    <path d="M-300,-330 C-190,-30 -190,270 -300,365"/>
    <path d="M-90,-360 C-60,-40 -60,280 -90,380"/>
    <path d="M90,-360 C60,-40 60,280 90,380"/>
    <path d="M300,-330 C190,-30 190,270 300,365"/>
    <path d="M520,-300 C310,-30 310,260 520,350"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="9s" repeatCount="indefinite"/>
  </g>
</g>

<circle cx="600" cy="390" r="190" fill="url(#massGlow)" opacity=".9" filter="url(#glow)">
  <animate attributeName="r" values="175;210;175" dur="9s" repeatCount="indefinite"/>
</circle>

<g font-family="Georgia, 'Times New Roman', serif" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
  <text x="600" y="372" font-size="58">E = mc²</text>
  <text x="600" y="430" font-size="28" opacity=".82">Gμν + Λgμν = 8πG Tμν / c⁴</text>
  <text x="600" y="690" font-size="24" opacity=".65">spacetime curvature • mass-energy • gravity</text>
</g>

<g fill="#ffffff" opacity=".7" filter="url(#glow)">
  <circle r="5" cx="0" cy="0">
    <animateMotion dur="13s" repeatCount="indefinite" path="M120,600 C350,180 850,180 1080,600"/>
    <animate attributeName="fill" values="#00f7ff;#ff00d4;#ffe600;#00f7ff" dur="13s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>