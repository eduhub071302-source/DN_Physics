<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced electrochemistry animated chemistry background">
<defs>
<radialGradient id="bg" cx="50%" cy="45%" r="75%"><stop stop-color="#0b2348"/><stop offset="55%" stop-color="#050814"/><stop offset="100%" stop-color="#02030a"/></radialGradient>
<linearGradient id="cyan" x1="0" x2="1"><stop stop-color="#5ff7ff"/><stop offset="1" stop-color="#7b61ff"/></linearGradient>
<linearGradient id="hot" x1="0" x2="1"><stop stop-color="#ffcf66"/><stop offset="1" stop-color="#ff4fd8"/></linearGradient>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
<pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M56 0H0V56" fill="none" stroke="#74eaff" stroke-opacity=".08"/></pattern>
</defs>
<style>
svg{width:100%;height:100%;display:block;background:#050814}.formula{font-family:Segoe UI,Arial,sans-serif;font-weight:700;letter-spacing:.5px}.dash{stroke-dasharray:12 18;animation:dash 38s linear infinite}.dash2{stroke-dasharray:4 12;animation:dash 22s linear infinite}.spin{animation:spin 34s linear infinite;transform-box:fill-box;transform-origin:center}.spinSlow{animation:spin 58s linear infinite;transform-box:fill-box;transform-origin:center}.driftA{animation:driftA 17s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.driftB{animation:driftB 21s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.pulse{animation:pulse 7s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.scan{animation:scan 10s linear infinite}.float{animation:float 12s ease-in-out infinite;transform-box:fill-box;transform-origin:center}@keyframes dash{to{stroke-dashoffset:-900}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes driftA{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(26px,-18px) rotate(2.8deg)}}@keyframes driftB{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(-24px,22px) rotate(-3deg)}}@keyframes pulse{0%,100%{opacity:.38;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}@keyframes scan{0%{transform:translateX(-160px);opacity:.04}50%{opacity:.5}100%{transform:translateX(1500px);opacity:.04}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}@media(max-width:700px){.formula{font-size:23px}.hideMobile{display:none}}
</style>
<rect width="1440" height="900" fill="url(#bg)"/><rect width="1440" height="900" fill="url(#grid)"/>
<circle cx="1060" cy="210" r="280" fill="#2ad9ff" opacity=".09" filter="url(#blur)" class="pulse"/><circle cx="300" cy="700" r="260" fill="#ff4fd8" opacity=".08" filter="url(#blur)" class="pulse"/>
<g class="scan"><rect width="115" height="900" fill="#7ffcff" opacity=".16" filter="url(#blur)"/></g>
<g transform="translate(205 225)" class="driftA"><rect width="270" height="420" rx="38" fill="#07172d" stroke="url(#cyan)" stroke-width="3" opacity=".9"/><path d="M35 252C95 212 158 298 232 246V366H35Z" fill="#27e8ff" opacity=".16"/><path class="dash" d="M35 252C95 212 158 298 232 246" fill="none" stroke="#8fffff" stroke-width="4"/><rect x="82" y="45" width="30" height="260" rx="15" fill="#ffcd70" opacity=".85"/><rect x="158" y="45" width="30" height="260" rx="15" fill="#b7ff82" opacity=".85"/><text class="formula" x="42" y="398" font-size="26" fill="#dffcff">Zn | Zn²⁺</text></g>
<g transform="translate(925 225)" class="driftB"><rect width="310" height="420" rx="38" fill="#07172d" stroke="url(#hot)" stroke-width="3" opacity=".9"/><path d="M35 252C125 305 198 206 272 252V366H35Z" fill="#ff4fd8" opacity=".14"/><path class="dash" d="M35 252C125 305 198 206 272 252" fill="none" stroke="#ffb2ef" stroke-width="4"/><rect x="98" y="45" width="30" height="260" rx="15" fill="#f4f7ff" opacity=".8"/><rect x="188" y="45" width="30" height="260" rx="15" fill="#ff756c" opacity=".82"/><text class="formula" x="48" y="398" font-size="25" fill="#ffeafb">Cu²⁺ | Cu</text></g>
<path class="dash" d="M475 335C610 150 805 150 925 335" fill="none" stroke="url(#cyan)" stroke-width="7" opacity=".75"/><path class="dash" d="M475 522C620 695 785 695 925 522" fill="none" stroke="url(#hot)" stroke-width="7" opacity=".55"/>
<g class="spin" transform="translate(720 450)"><circle r="105" fill="none" stroke="#8cffea" stroke-width="2" opacity=".35"/><ellipse rx="195" ry="55" fill="none" stroke="#ffcc6e" stroke-width="3" opacity=".48"/><ellipse rx="195" ry="55" fill="none" stroke="#a66bff" stroke-width="3" opacity=".48" transform="rotate(60)"/><ellipse rx="195" ry="55" fill="none" stroke="#5ff7ff" stroke-width="3" opacity=".48" transform="rotate(120)"/><circle cx="195" cy="0" r="9" fill="#5ff7ff" filter="url(#glow)"/></g>
<g class="spinSlow hideMobile" transform="translate(720 450)"><path class="dash2" d="M-315 -100C-120 -250 145 -240 315 -100M-315 100C-110 255 150 235 315 100" fill="none" stroke="#ffffff" stroke-width="2" opacity=".24"/></g>
<text class="formula pulse" x="520" y="150" font-size="34" fill="#eaffff">ΔG = −nFE°</text><text class="formula pulse" x="548" y="760" font-size="30" fill="#fff2c9">E = E° − (RT/nF) ln Q</text><text class="formula hideMobile" x="560" y="595" font-size="26" fill="#affff0">anode → cathode · electron flow · salt bridge</text>
<circle class="float" cx="565" cy="280" r="7" fill="#dffcff" opacity=".8"/><circle class="float" cx="875" cy="610" r="6" fill="#ffe28f" opacity=".8" style="animation-delay:1.3s"/><circle class="float" cx="700" cy="225" r="5" fill="#ff9bea" opacity=".8" style="animation-delay:2.1s"/>
</svg>
