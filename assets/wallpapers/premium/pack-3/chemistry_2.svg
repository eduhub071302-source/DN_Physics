<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced animated reaction kinetics chemistry background">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061314"/><stop offset=".5" stop-color="#11243c"/><stop offset="1" stop-color="#18091f"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0V80" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern><style>svg{width:100%;height:100%;display:block;background:#05070d}.soft{filter:url(#glow)}.tiny{font-size:18px}.small{font-size:25px}.med{font-size:38px}.formula{font-family:Georgia,serif;fill:#eaffff;opacity:.78;animation:drift 16s ease-in-out infinite alternate}.stream{fill:none;stroke-linecap:round;stroke-dasharray:12 24;animation:dash 5.5s linear infinite;filter:url(#glow)}.s2{animation-duration:7.5s;animation-direction:reverse}.mol{filter:url(#glow);transform-origin:center;animation:spin 28s linear infinite}.m2{animation-duration:38s;animation-direction:reverse}@media(max-width:700px){.tiny{font-size:14px}.small{font-size:19px}.med{font-size:27px}}@keyframes drift{from{transform:translate(-16px,-10px)}to{transform:translate(18px,12px)}}@keyframes dash{to{stroke-dashoffset:-360}}@keyframes spin{to{transform:rotate(360deg)}}</style></defs>
<rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"><animateTransform attributeName="transform" type="translate" values="0 0;80 0;0 0" dur="32s" repeatCount="indefinite"/></rect><path class="stream" d="M60 475 C275 320 465 604 695 446 S1090 265 1540 430" stroke="#7affd9" stroke-width="4"/><path class="stream s2" d="M65 535 C330 720 475 380 780 575 S1230 735 1530 530" stroke="#ff9df0" stroke-width="3"/>
<g class="soft" font-family="Georgia,serif"><text x="500" y="430" class="med" fill="#fff">2NO₂(g) ⇌ N₂O₄(g)</text><text x="540" y="490" class="small" fill="#cffff6">rate = k[A]<tspan baseline-shift="super">m</tspan>[B]<tspan baseline-shift="super">n</tspan></text></g><g class="formula"><text x="80" y="120" class="small">ln(k₂/k₁)=−Eₐ/R(1/T₂−1/T₁)</text><text x="1050" y="120" class="small">ΔG° = −RT lnK</text><text x="90" y="785" class="small">t<tspan baseline-shift="sub">1/2</tspan> = 0.693/k</text><text x="1125" y="785" class="small">K<tspan baseline-shift="sub">eq</tspan> = Q at equilibrium</text></g>
<g class="mol" transform="translate(310 500)"><line x1="0" y1="0" x2="95" y2="-52" stroke="#8fffe8" stroke-width="4"/><line x1="0" y1="0" x2="92" y2="55" stroke="#8fffe8" stroke-width="4"/><circle r="21" fill="#ff8fe7"/><circle cx="95" cy="-52" r="15" fill="#8fffe8"/><circle cx="92" cy="55" r="15" fill="#8fffe8"/></g><g class="mol m2" transform="translate(1280 520)"><polygon points="0,-58 55,-18 34,48 -34,48 -55,-18" fill="none" stroke="#ffd36e" stroke-width="4"/><circle r="17" fill="#ffd36e"/></g><g fill="#fff" class="soft"><circle cx="220" cy="270" r="5"><animate attributeName="cy" values="270;210;270" dur="10s" repeatCount="indefinite"/></circle><circle cx="850" cy="175" r="4"><animate attributeName="cy" values="175;230;175" dur="12s" repeatCount="indefinite"/></circle><circle cx="1360" cy="690" r="6"><animate attributeName="cy" values="690;620;690" dur="14s" repeatCount="indefinite"/></circle></g></svg>
