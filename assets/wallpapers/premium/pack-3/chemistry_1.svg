<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced animated nanomaterial chemistry lattice background">
<defs><radialGradient id="bg" cx="50%" cy="48%" r="75%"><stop stop-color="#251245"/><stop offset=".55" stop-color="#08111e"/><stop offset="1" stop-color="#030304"/></radialGradient><linearGradient id="bondg" x1="0" x2="1"><stop stop-color="#65fff1"/><stop offset=".5" stop-color="#f69cff"/><stop offset="1" stop-color="#ffe47a"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0V80" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern><style>svg{width:100%;height:100%;display:block;background:#05070d}.soft{filter:url(#glow)}.tiny{font-size:18px}.small{font-size:25px}.formula{font-family:Georgia,serif;fill:#eaffff;opacity:.78;animation:drift 16s ease-in-out infinite alternate}.sheet{transform-origin:800px 450px;animation:tilt 18s ease-in-out infinite alternate}.bond{stroke:url(#bondg);stroke-width:2.4;opacity:.6;filter:url(#glow)}.atom{fill:#edffff;filter:url(#glow);animation:pulse 4.5s ease-in-out infinite}.wave{stroke-dasharray:20 26;animation:dash 14s linear infinite}@media(max-width:700px){.tiny{font-size:14px}.small{font-size:19px}.hideMobile{display:none}}@keyframes tilt{from{transform:rotate(-2deg) translateY(-10px)}to{transform:rotate(3deg) translateY(15px)}}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}@keyframes drift{from{transform:translate(-16px,-10px)}to{transform:translate(18px,12px)}}@keyframes dash{to{stroke-dashoffset:-700}}</style></defs><rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"><animateTransform attributeName="transform" type="translate" values="0 0;80 80;0 0" dur="30s" repeatCount="indefinite"/></rect><g class="sheet">
