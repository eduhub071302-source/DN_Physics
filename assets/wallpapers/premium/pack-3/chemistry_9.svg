<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ultra smooth animated chemistry molecular network background">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#10384a"/>
      <stop offset="45%" stop-color="#071b2d"/>
      <stop offset="100%" stop-color="#030711"/>
      <animate attributeName="cx" values="44%;56%;47%;44%" dur="24s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
      <animate attributeName="cy" values="40%;53%;46%;40%" dur="28s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#43f7dd" stop-opacity=".15"/>
      <stop offset=".5" stop-color="#d8fff9" stop-opacity=".85"/>
      <stop offset="1" stop-color="#9b7cff" stop-opacity=".18"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="microgrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#89fff0" stroke-opacity=".06" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#89fff0" opacity=".18"/>
    </pattern>
    <style>
      .eq{font-family:'Times New Roman',serif;font-size:33px;fill:#d8fff9;opacity:.78;filter:url(#glow)}
      .tiny{font-family:ui-monospace,Menlo,monospace;font-size:18px;fill:#8dfcec;opacity:.55}
      .atom{filter:url(#glow)}
      .bond{stroke:url(#bond);stroke-width:5;stroke-linecap:round;opacity:.75;stroke-dasharray:12 18;animation: dash 13s linear infinite}
      .bond2{stroke:#9b7cff;stroke-opacity:.55;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 16;animation: dash 18s linear infinite reverse}
      .floatA{animation: floatA 18s ease-in-out infinite}.floatB{animation: floatB 22s ease-in-out infinite}.floatC{animation: floatC 26s ease-in-out infinite}
      .pulse{animation: pulse 5s ease-in-out infinite}.spin{transform-box:fill-box;transform-origin:center;animation: spin 38s linear infinite}.spinR{transform-box:fill-box;transform-origin:center;animation: spin 52s linear infinite reverse}
      @keyframes dash{to{stroke-dashoffset:-360}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:.45;transform:scale(.98)}50%{opacity:1;transform:scale(1.04)}}
      @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,-24px)}}
      @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-34px,22px)}}
      @keyframes floatC{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,34px)}}
      @media (max-width:700px){.eq{font-size:24px}.tiny{font-size:14px}.bond{stroke-width:3.5}}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#microgrid)">
    <animateTransform attributeName="transform" type="translate" values="0 0;54 54;0 0" dur="34s" repeatCount="indefinite"/>
  </rect>
  <g opacity=".22" fill="none" stroke="#43f7dd" stroke-width="2">
    <path d="M-80 688 C210 548 300 822 598 644 S1040 430 1690 576" stroke-dasharray="10 24"><animate attributeName="d" dur="22s" repeatCount="indefinite" values="M-80 688 C210 548 300 822 598 644 S1040 430 1690 576;M-80 642 C225 518 338 776 610 618 S1055 490 1690 524;M-80 688 C210 548 300 822 598 644 S1040 430 1690 576"/></path>
    <path d="M-120 272 C180 118 382 344 636 240 S1050 112 1720 290" stroke="#a98cff" stroke-dasharray="14 20"><animate attributeName="d" dur="26s" repeatCount="indefinite" values="M-120 272 C180 118 382 344 636 240 S1050 112 1720 290;M-120 308 C200 176 390 284 660 266 S1030 142 1720 334;M-120 272 C180 118 382 344 636 240 S1050 112 1720 290"/></path>
  </g>
  <g class="floatA">
    <line class="bond" x1="245" y1="285" x2="395" y2="205"/><line class="bond" x1="395" y1="205" x2="552" y2="292"/><line class="bond" x1="552" y1="292" x2="548" y2="474"/><line class="bond" x1="548" y1="474" x2="382" y2="560"/><line class="bond" x1="382" y1="560" x2="230" y2="472"/><line class="bond" x1="230" y1="472" x2="245" y2="285"/>
    <circle class="atom pulse" cx="245" cy="285" r="18" fill="#43f7dd"/><circle class="atom pulse" cx="395" cy="205" r="23" fill="#f7ffff"/><circle class="atom pulse" cx="552" cy="292" r="18" fill="#9b7cff"/><circle class="atom pulse" cx="548" cy="474" r="24" fill="#ffcb6b"/><circle class="atom pulse" cx="382" cy="560" r="18" fill="#43f7dd"/><circle class="atom pulse" cx="230" cy="472" r="20" fill="#ff7ab6"/>
  </g>
  <g class="floatB">
    <line class="bond" x1="930" y1="250" x2="1084" y2="170"/><line class="bond" x1="1084" y1="170" x2="1242" y2="252"/><line class="bond" x1="1242" y1="252" x2="1248" y2="420"/><line class="bond" x1="1248" y1="420" x2="1088" y2="506"/><line class="bond" x1="1088" y1="506" x2="936" y2="420"/><line class="bond" x1="936" y1="420" x2="930" y2="250"/>
    <line class="bond2" x1="1248" y1="420" x2="1390" y2="498"/><line class="bond2" x1="930" y1="250" x2="792" y2="174"/>
    <circle class="atom pulse" cx="930" cy="250" r="19" fill="#8dfcec"/><circle class="atom pulse" cx="1084" cy="170" r="25" fill="#ffffff"/><circle class="atom pulse" cx="1242" cy="252" r="19" fill="#ff7ab6"/><circle class="atom pulse" cx="1248" cy="420" r="20" fill="#8dfcec"/><circle class="atom pulse" cx="1088" cy="506" r="24" fill="#ffcb6b"/><circle class="atom pulse" cx="936" cy="420" r="18" fill="#9b7cff"/><circle class="atom pulse" cx="1390" cy="498" r="14" fill="#f7ffff"/><circle class="atom pulse" cx="792" cy="174" r="14" fill="#f7ffff"/>
  </g>
  <g class="spin" opacity=".75"><ellipse cx="805" cy="460" rx="260" ry="68" fill="none" stroke="#43f7dd" stroke-opacity=".35" stroke-width="2"/><ellipse cx="805" cy="460" rx="260" ry="68" fill="none" stroke="#a98cff" stroke-opacity=".26" stroke-width="2" transform="rotate(60 805 460)"/><ellipse cx="805" cy="460" rx="260" ry="68" fill="none" stroke="#ffcb6b" stroke-opacity=".22" stroke-width="2" transform="rotate(120 805 460)"/></g>
  <g class="spinR"><circle cx="805" cy="460" r="9" fill="#ffffff" filter="url(#glow)"/><circle cx="1065" cy="460" r="6" fill="#43f7dd" filter="url(#glow)"/><circle cx="545" cy="460" r="6" fill="#ff7ab6" filter="url(#glow)"/></g>
  <g class="floatC">
    <text class="eq" x="130" y="105">2H₂ + O₂ → 2H₂O</text>
    <text class="eq" x="1090" y="112">pH = −log[H⁺]</text>
    <text class="eq" x="94" y="790">ΔG = ΔH − TΔS</text>
    <text class="eq" x="1015" y="790">PV = nRT</text>
    <text class="tiny" x="645" y="98">rate = k[A]ᵐ[B]ⁿ</text>
    <text class="tiny" x="650" y="830">E = E° − (RT/nF) ln Q</text>
  </g>
  <g opacity=".65" filter="url(#glow)">
    <circle cx="100" cy="210" r="2" fill="#fff"><animate attributeName="cy" values="210;160;210" dur="7s" repeatCount="indefinite"/></circle><circle cx="1480" cy="660" r="2.5" fill="#43f7dd"><animate attributeName="cy" values="660;710;660" dur="8s" repeatCount="indefinite"/></circle><circle cx="690" cy="725" r="2" fill="#ffcb6b"><animate attributeName="cx" values="690;750;690" dur="9s" repeatCount="indefinite"/></circle><circle cx="1510" cy="180" r="2" fill="#a98cff"><animate attributeName="cx" values="1510;1450;1510" dur="10s" repeatCount="indefinite"/></circle>
  </g>
</svg>
