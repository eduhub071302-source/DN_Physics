<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced animated quantum chemistry background">
<defs>
<radialGradient id="bg" cx="50%" cy="46%" r="75%"><stop stop-color="#19336f"/><stop offset=".55" stop-color="#070d22"/><stop offset="1" stop-color="#02030a"/></radialGradient>
<linearGradient id="orb" x1="0" x2="1"><stop stop-color="#65f7ff"/><stop offset="1" stop-color="#c38cff"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0V80" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern>
<style>
svg{width:100%;height:100%;display:block;background:#05070d}.soft{filter:url(#glow)}.tiny{font-size:18px}.small{font-size:25px}.med{font-size:38px}.formula{font-family:Georgia,serif;fill:#eaffff;opacity:.78;animation:drift 16s ease-in-out infinite alternate}.particle{fill:#eaffff;opacity:.65;filter:url(#glow)}@media(max-width:700px){.tiny{font-size:14px}.small{font-size:19px}.med{font-size:27px}.hideMobile{display:none}}.orb{fill:none;stroke:url(#orb);stroke-width:2.2;opacity:.52;transform-origin:800px 455px;animation:spin 22s linear infinite}.o2{animation-duration:30s;animation-direction:reverse}.o3{animation-duration:38s;opacity:.34}.electron{fill:#aaffff;filter:url(#glow);transform-origin:800px 455px;animation:spin 7s linear infinite}.e2{animation-duration:10s;animation-direction:reverse;fill:#ffc2ff}.e3{animation-duration:13s;fill:#b6ff99}.dash{stroke-dasharray:20 26;animation:dash 16s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes drift{from{transform:translate(-16px,-10px)}to{transform:translate(18px,12px)}}@keyframes dash{to{stroke-dashoffset:-760}}
</style>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"><animateTransform attributeName="transform" type="translate" values="0 0;80 80;0 0" dur="35s" repeatCount="indefinite"/></rect>
<g class="soft"><ellipse class="orb" cx="800" cy="455" rx="420" ry="88"/><ellipse class="orb o2" cx="800" cy="455" rx="420" ry="88" transform="rotate(60 800 455)"/><ellipse class="orb o3" cx="800" cy="455" rx="420" ry="88" transform="rotate(120 800 455)"/><circle cx="800" cy="455" r="82" fill="#132449" stroke="#94faff" stroke-width="2"><animate attributeName="r" values="74;90;74" dur="8s" repeatCount="indefinite"/></circle><text x="762" y="470" class="med" fill="#fff" font-family="Georgia">Ψ</text><g class="electron"><circle cx="1220" cy="455" r="9"/></g><g class="electron e2"><circle cx="380" cy="455" r="8"/></g><g class="electron e3"><circle cx="800" cy="367" r="8"/></g></g>
<g class="formula"><text x="80" y="110" class="small">ΔG = ΔH − TΔS</text><text x="1120" y="125" class="small">E = E° − (RT/nF)lnQ</text><text x="94" y="790" class="small">k = A e<tspan baseline-shift="super">−Eₐ/RT</tspan></text><text x="1010" y="790" class="small">pH = pKₐ + log([A⁻]/[HA])</text><text x="590" y="120" class="tiny hideMobile">∇²Ψ + 8π²m(E−V)Ψ/h² = 0</text></g>
<path class="dash soft" d="M0 625 C300 480 450 735 720 590 S1160 400 1600 560" fill="none" stroke="#6df7ff" stroke-width="3" opacity=".38"/>
<g class="soft" fill="#dfffff"><circle cx="180" cy="230" r="4"><animate attributeName="cy" values="230;190;230" dur="9s" repeatCount="indefinite"/></circle><circle cx="360" cy="720" r="6"><animate attributeName="cy" values="720;660;720" dur="13s" repeatCount="indefinite"/></circle><circle cx="620" cy="210" r="3"><animate attributeName="cy" values="210;250;210" dur="11s" repeatCount="indefinite"/></circle><circle cx="980" cy="680" r="5"><animate attributeName="cy" values="680;620;680" dur="15s" repeatCount="indefinite"/></circle><circle cx="1390" cy="300" r="5"><animate attributeName="cy" values="300;250;300" dur="12s" repeatCount="indefinite"/></circle></g>
</svg>
