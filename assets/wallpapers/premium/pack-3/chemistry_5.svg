<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced animated crystallography chemistry background">
<defs><radialGradient id="bg" cx="50%" cy="48%" r="76%"><stop stop-color="#24184c"/><stop offset="58%" stop-color="#070511"/><stop offset="100%" stop-color="#02020a"/></radialGradient><linearGradient id="cyan" x1="0" x2="1"><stop stop-color="#5ff7ff"/><stop offset="1" stop-color="#7b61ff"/></linearGradient><linearGradient id="hot" x1="0" x2="1"><stop stop-color="#ffcf66"/><stop offset="1" stop-color="#ff4fd8"/></linearGradient><linearGradient id="lime" x1="0" x2="1"><stop stop-color="#9dff7a"/><stop offset="1" stop-color="#34ffd2"/></linearGradient><filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="blur"><feGaussianBlur stdDeviation="24"/></filter><pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M60 0H0V60" fill="none" stroke="#b78cff" stroke-opacity=".08"/></pattern></defs>
<style>svg{width:100%;height:100%;display:block;background:#070511}.formula{font-family:Segoe UI,Arial,sans-serif;font-weight:700}.dash{stroke-dasharray:14 18;animation:dash 44s linear infinite}.spin{animation:spin 48s linear infinite;transform-box:fill-box;transform-origin:center}.spinR{animation:spinR 68s linear infinite;transform-box:fill-box;transform-origin:center}.drift{animation:drift 20s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.pulse{animation:pulse 8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.float{animation:float 12s ease-in-out infinite;transform-box:fill-box;transform-origin:center}@keyframes dash{to{stroke-dashoffset:-1000}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinR{to{transform:rotate(-360deg)}}@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,-22px)}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-36px)}}@media(max-width:700px){.formula{font-size:23px}.hideMobile{display:none}}</style>
<rect width="1440" height="900" fill="url(#bg)"/><rect width="1440" height="900" fill="url(#grid)" opacity=".8"/><circle class="pulse" cx="720" cy="455" r="390" fill="#a66bff" opacity=".1" filter="url(#blur)"/>
<g class="drift" opacity=".8"><line class="dash" x1="120" y1="120" x2="40" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="270" y1="120" x2="190" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="420" y1="120" x2="340" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="570" y1="120" x2="490" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="720" y1="120" x2="640" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="870" y1="120" x2="790" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="1020" y1="120" x2="940" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="1170" y1="120" x2="1090" y2="780" stroke="#63f7ff" stroke-width="2" opacity=".24"/><line class="dash" x1="80" y1="130" x2="1320" y2="70" stroke="#d283ff" stroke-width="2" opacity=".18"/><line class="dash" x1="80" y1="235" x2="1320" y2="175" stroke="#d283ff" stroke-width="2" opacity=".18"/><line class="dash" x1="80" y1="340" x2="1320" y2="280" stroke="#d283ff" stroke-width="2" opacity=".18"/><line class="dash" x1="80" y1="445" x2="1320" y2="385" stroke="#d283ff" stroke-width="2" opacity=".18"/><line class="dash" x1="80" y1="550" x2="1320" y2="490" stroke="#d283ff" stroke-width="2" opacity=".18"/><line class="dash" x1="80" y1="655" x2="1320" y2="595" stroke="#d283ff" stroke-width="2" opacity=".18"/></g>
<g transform="translate(720 455)" class="spin"><polygon points="0,-270 234,-135 234,135 0,270 -234,135 -234,-135" fill="none" stroke="url(#cyan)" stroke-width="4" opacity=".56"/><polygon points="0,-170 147,-85 147,85 0,170 -147,85 -147,-85" fill="none" stroke="url(#hot)" stroke-width="3" opacity=".52"/></g>
<g transform="translate(720 455)" class="spinR"><circle cx="-234" cy="-135" r="15" fill="#5ff7ff" filter="url(#glow)"/><circle cx="0" cy="-270" r="15" fill="#ffcf66" filter="url(#glow)"/><circle cx="234" cy="-135" r="15" fill="#9dff7a" filter="url(#glow)"/><circle cx="234" cy="135" r="15" fill="#ff4fd8" filter="url(#glow)"/><circle cx="0" cy="270" r="15" fill="#5ff7ff" filter="url(#glow)"/><circle cx="-234" cy="135" r="15" fill="#a66bff" filter="url(#glow)"/><circle cx="0" cy="0" r="18" fill="#fff" filter="url(#glow)"/></g>
<path class="dash" d="M180 680C360 540 490 750 650 605S970 515 1260 705" fill="none" stroke="url(#lime)" stroke-width="5" opacity=".7"/>
<text class="formula pulse" x="100" y="135" font-size="34" fill="#e8fbff">Bragg: nλ = 2d sin θ</text><text class="formula pulse" x="910" y="155" font-size="28" fill="#ffe7ff">ρ = ZM / NₐV</text><text class="formula" x="525" y="820" font-size="26" fill="#d7fff7">unit cell · lattice planes · diffraction peaks</text>
