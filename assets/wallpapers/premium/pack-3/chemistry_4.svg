<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Advanced biochemical pathway animated chemistry background">
<defs><radialGradient id="bg" cx="50%" cy="50%" r="76%"><stop stop-color="#0b2b32"/><stop offset="58%" stop-color="#06100f"/><stop offset="100%" stop-color="#020807"/></radialGradient><linearGradient id="lime" x1="0" x2="1"><stop stop-color="#9dff7a"/><stop offset="1" stop-color="#34ffd2"/></linearGradient><linearGradient id="hot" x1="0" x2="1"><stop stop-color="#ffcf66"/><stop offset="1" stop-color="#ff4fd8"/></linearGradient><filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="blur"><feGaussianBlur stdDeviation="24"/></filter><pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse"><path d="M62 0H0V62" fill="none" stroke="#8cffea" stroke-opacity=".07"/></pattern></defs>
<style>svg{width:100%;height:100%;display:block;background:#06100f}.formula{font-family:Segoe UI,Arial,sans-serif;font-weight:700}.dash{stroke-dasharray:16 20;animation:dash 36s linear infinite}.spin{animation:spin 38s linear infinite;transform-box:fill-box;transform-origin:center}.driftA{animation:driftA 16s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.driftB{animation:driftB 20s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.pulse{animation:pulse 7s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.float{animation:float 11s ease-in-out infinite;transform-box:fill-box;transform-origin:center}@keyframes dash{to{stroke-dashoffset:-900}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes driftA{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(24px,-20px) rotate(3deg)}}@keyframes driftB{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(-22px,24px) rotate(-3deg)}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-34px)}}@media(max-width:700px){.formula{font-size:22px}.hideMobile{display:none}}</style>
<rect width="1440" height="900" fill="url(#bg)"/><rect width="1440" height="900" fill="url(#grid)"/><circle class="pulse" cx="315" cy="270" r="260" fill="#48ffb5" opacity=".09" filter="url(#blur)"/><circle class="pulse" cx="1120" cy="620" r="310" fill="#ff5bd6" opacity=".08" filter="url(#blur)"/>
<path class="dash" d="M100 470C260 260 420 700 590 450S930 210 1080 470S1250 690 1360 460" fill="none" stroke="url(#lime)" stroke-width="7" opacity=".72"/><path class="dash" d="M100 520C280 730 420 300 590 540S920 760 1080 520S1260 270 1360 535" fill="none" stroke="url(#hot)" stroke-width="5" opacity=".46"/>
<g class="driftA" transform="translate(230 275)"><circle r="72" fill="#071b22" stroke="#8cffea" stroke-width="3"/><text class="formula" x="-42" y="9" font-size="26" fill="#dcfff8">ATP</text></g><g class="driftB" transform="translate(545 610)"><circle r="76" fill="#151029" stroke="#ffcf66" stroke-width="3"/><text class="formula" x="-48" y="9" font-size="25" fill="#fff3c4">ADP</text></g><g class="driftA" transform="translate(895 305)"><circle r="88" fill="#0f1228" stroke="#ff78db" stroke-width="3"/><text class="formula" x="-60" y="8" font-size="25" fill="#ffe5fb">NADH</text></g><g class="driftB" transform="translate(1165 595)"><circle r="86" fill="#081a2e" stroke="#69f7ff" stroke-width="3"/><text class="formula" x="-64" y="9" font-size="24" fill="#e1fbff">NAD⁺</text></g>
<g class="spin" transform="translate(720 450)"><path d="M-135 0C-105-105 105-105 135 0C105 105-105 105-135 0Z" fill="none" stroke="#9dff7a" stroke-width="3" opacity=".55"/><path d="M0-135C105-105 105 105 0 135C-105 105-105-105 0-135Z" fill="none" stroke="#5ff7ff" stroke-width="3" opacity=".45"/><circle cx="0" cy="0" r="12" fill="#fff" filter="url(#glow)"/></g>
<text class="formula pulse" x="90" y="120" font-size="32" fill="#eaffff">C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energy</text><text class="formula pulse" x="855" y="805" font-size="28" fill="#fff2c8">ΔH = ΣE broken − ΣE formed</text><text class="formula hideMobile" x="430" y="182" font-size="26" fill="#b8fff1">v = Vmax[S] / (Km + [S])</text>
<circle class="float" cx="120" cy="210" r="4" fill="#dffcff" opacity=".55"/><circle class="float" cx="202" cy="300" r="6" fill="#dffcff" opacity=".7" style="animation-delay:.4s"/><circle class="float" cx="284" cy="390" r="8" fill="#dffcff" opacity=".6" style="animation-delay:.8s"/><circle class="float" cx="366" cy="480" r="4" fill="#dffcff" opacity=".8" style="animation-delay:1.2s"/><circle class="float" cx="448" cy="570" r="7" fill="#dffcff" opacity=".6" style="animation-delay:1.6s"/><circle class="float" cx="530" cy="210" r="5" fill="#dffcff" opacity=".7" style="animation-delay:2s"/><circle class="float" cx="612" cy="300" r="8" fill="#dffcff" opacity=".5" style="animation-delay:2.4s"/><circle class="float" cx="694" cy="390" r="6" fill="#dffcff" opacity=".7" style="animation-delay:2.8s"/><circle class="float" cx="776" cy="480" r="5" fill="#dffcff" opacity=".6" style="animation-delay:3.2s"/><circle class="float" cx="858" cy="570" r="8" fill="#dffcff" opacity=".65" style="animation-delay:3.6s"/><circle class="float" cx="940" cy="210" r="4" fill="#dffcff" opacity=".7" style="animation-delay:4s"/><circle class="float" cx="1022" cy="300" r="6" fill="#dffcff" opacity=".5" style="animation-delay:4.4s"/><circle class="float" cx="1104" cy="390" r="8" fill="#dffcff" opacity=".75" style="animation-delay:4.8s"/><circle class="float" cx="1186" cy="480" r="5" fill="#dffcff" opacity=".6" style="animation-delay:5.2s"/><circle class="float" cx="1268" cy="570" r="7" fill="#dffcff" opacity=".7" style="animation-delay:5.6s"/>
</svg>
