<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated matrix rain mathematics background">
<defs>
      <radialGradient id="bg" cx="50%" cy="45%" r="75%">
        <stop offset="0%" stop-color="#173a69"/>
        <stop offset="48%" stop-color="#09152d"/>
        <stop offset="100%" stop-color="#02040a"/>
        <animate attributeName="cx" values="42%;58%;44%;52%;42%" dur="34s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="38%;54%;44%;62%;38%" dur="39s" repeatCount="indefinite"/>
      </radialGradient>
      <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#54f2ff"/><stop offset=".5" stop-color="#b56cff"/><stop offset="1" stop-color="#fff06a"/>
        <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="22s" repeatCount="indefinite"/>
      </linearGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
        <path d="M56 0H0V56" fill="none" stroke="rgba(120,220,255,.11)" stroke-width="1"/>
        <animate attributeName="width" values="52;64;52" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="height" values="52;64;52" dur="18s" repeatCount="indefinite"/>
      </pattern>
      
    </defs>
<style><![CDATA[
  svg { width:100%; height:100%; display:block; background:#05070f; }
  .soft { filter:url(#glow); }
  .formula { font-family: 'Times New Roman', Georgia, serif; fill: rgba(235,245,255,.86); font-size: 30px; letter-spacing:.5px; }
  .tiny { font-size: 18px; opacity:.68; }
  .mid { font-size: 24px; opacity:.78; }
  .stroke { fill:none; stroke-linecap:round; stroke-linejoin:round; }
  @keyframes driftA { from{transform:translate3d(-80px,20px,0)} to{transform:translate3d(80px,-20px,0)} }
  @keyframes driftB { from{transform:translate3d(50px,-40px,0)} to{transform:translate3d(-60px,40px,0)} }
  @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-32px)} }
  @keyframes pulse { 0%,100%{opacity:.38} 50%{opacity:.95} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes spinR { to{transform:rotate(-360deg)} }
  @keyframes dash { to{stroke-dashoffset:-1200} }
  @keyframes wave { 0%,100%{transform:translateX(-40px)} 50%{transform:translateX(40px)} }
  @keyframes shimmer { 0%,100%{opacity:.18} 50%{opacity:.58} }
  .driftA { animation: driftA 18s ease-in-out infinite alternate; }
  .driftB { animation: driftB 24s ease-in-out infinite alternate; }
  .float1 { animation: floatY 9s ease-in-out infinite; }
  .float2 { animation: floatY 13s ease-in-out infinite reverse; }
  .pulse { animation: pulse 7s ease-in-out infinite; }
  .spin { transform-box:fill-box; transform-origin:center; animation: spin 42s linear infinite; }
  .spinR { transform-box:fill-box; transform-origin:center; animation: spinR 58s linear infinite; }
  .dash { stroke-dasharray:22 22; animation: dash 28s linear infinite; }
  .wave { animation: wave 16s ease-in-out infinite; }
  .shimmer { animation: shimmer 11s ease-in-out infinite; }
  @media (max-width: 700px) { .formula{font-size:22px}.mid{font-size:19px}.tiny{font-size:15px} }
]]></style>
<rect width="1600" height="900" fill="#020807"/>
<rect width="1600" height="900" fill="url(#bg)" opacity=".55"/>
<g opacity=".33" class="shimmer"><line x1="0" y1="0" x2="0" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="80" y1="0" x2="80" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="160" y1="0" x2="160" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="240" y1="0" x2="240" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="320" y1="0" x2="320" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="400" y1="0" x2="400" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="480" y1="0" x2="480" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="560" y1="0" x2="560" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="640" y1="0" x2="640" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="720" y1="0" x2="720" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="800" y1="0" x2="800" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="880" y1="0" x2="880" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="960" y1="0" x2="960" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1040" y1="0" x2="1040" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1120" y1="0" x2="1120" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1200" y1="0" x2="1200" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1280" y1="0" x2="1280" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1360" y1="0" x2="1360" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1440" y1="0" x2="1440" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1520" y1="0" x2="1520" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/><line x1="1600" y1="0" x2="1600" y2="900" stroke="#5cffd6" stroke-width="1" opacity=".25"/></g>
<g class="formula tiny" fill="#aaffea">
<text x="60" y="-80" opacity="0.25">∑ π √2 ∇ dx λ μ Ω<animate attributeName="y" values="-120;1020" dur="16s" begin="-0.0s" repeatCount="indefinite"/></text>
<text x="175" y="-80" opacity="0.37">π √2 ∇ dx λ μ Ω ∂<animate attributeName="y" values="-120;1020" dur="19s" begin="-1.7s" repeatCount="indefinite"/></text>
<text x="290" y="-80" opacity="0.49">√2 ∇ dx λ μ Ω ∂ ∞<animate attributeName="y" values="-120;1020" dur="22s" begin="-3.4s" repeatCount="indefinite"/></text>
<text x="405" y="-80" opacity="0.61">∇ dx λ μ Ω ∂ ∞ sinθ<animate attributeName="y" values="-120;1020" dur="25s" begin="-5.1s" repeatCount="indefinite"/></text>
<text x="520" y="-80" opacity="0.25">dx λ μ Ω ∂ ∞ sinθ cosθ<animate attributeName="y" values="-120;1020" dur="28s" begin="-6.8s" repeatCount="indefinite"/></text>
<text x="635" y="-80" opacity="0.37">λ μ Ω ∂ ∞ sinθ cosθ A⁻¹<animate attributeName="y" values="-120;1020" dur="31s" begin="-8.5s" repeatCount="indefinite"/></text>
<text x="750" y="-80" opacity="0.49">μ Ω ∂ ∞ sinθ cosθ A⁻¹ rank<animate attributeName="y" values="-120;1020" dur="34s" begin="-10.2s" repeatCount="indefinite"/></text>
<text x="865" y="-80" opacity="0.61">Ω ∂ ∞ sinθ cosθ A⁻¹ rank log<animate attributeName="y" values="-120;1020" dur="16s" begin="-11.9s" repeatCount="indefinite"/></text>
<text x="980" y="-80" opacity="0.25">∂ ∞ sinθ cosθ A⁻¹ rank log lim<animate attributeName="y" values="-120;1020" dur="19s" begin="-13.6s" repeatCount="indefinite"/></text>
<text x="1095" y="-80" opacity="0.37">∞ sinθ cosθ A⁻¹ rank log lim ∑<animate attributeName="y" values="-120;1020" dur="22s" begin="-15.299999999999999s" repeatCount="indefinite"/></text>
<text x="1210" y="-80" opacity="0.49">sinθ cosθ A⁻¹ rank log lim ∑ π<animate attributeName="y" values="-120;1020" dur="25s" begin="-17.0s" repeatCount="indefinite"/></text>
<text x="1325" y="-80" opacity="0.61">cosθ A⁻¹ rank log lim ∑ π √2<animate attributeName="y" values="-120;1020" dur="28s" begin="-18.7s" repeatCount="indefinite"/></text>
<text x="1440" y="-80" opacity="0.25">A⁻¹ rank log lim ∑ π √2 ∇<animate attributeName="y" values="-120;1020" dur="31s" begin="-20.4s" repeatCount="indefinite"/></text>
<text x="1555" y="-80" opacity="0.37">rank log lim ∑ π √2 ∇ dx<animate attributeName="y" values="-120;1020" dur="34s" begin="-22.099999999999998s" repeatCount="indefinite"/></text>
</g>
<g class="spin soft" transform="translate(800 450)">
 <circle r="250" fill="none" stroke="url(#cyan)" stroke-width="2" opacity=".8"/>
 <path d="M-250 0 C-160 -220 160 -220 250 0 C160 220 -160 220 -250 0Z" fill="none" stroke="#faff8a" stroke-width="2" opacity=".48"/>
 <path d="M0 -250 C220 -160 220 160 0 250 C-220 160 -220 -160 0 -250Z" fill="none" stroke="#8dfcff" stroke-width="2" opacity=".48"/>
</g>
<g class="formula soft float1"><text x="120" y="160">Ax=b ⇒ x=A<tspan baseline-shift="super">−1</tspan>b</text><text x="980" y="170" class="mid">∇·E = ρ/ε₀</text><text x="965" y="755">σ = √Var(X)</text></g>
<g class="formula float2"><text x="155" y="760" class="mid">f′(x)=lim<tspan baseline-shift="sub">h→0</tspan> [f(x+h)−f(x)]/h</text><text x="625" y="105" class="tiny">χ² = Σ(O−E)²/E</text></g>
<path d="M-100 500 C180 300 330 610 520 420 S820 220 1020 430 1300 660 1700 280" class="stroke dash soft" stroke="#5cffd6" stroke-width="4" opacity=".55"/>
<g class="pulse soft"><circle cx="800" cy="450" r="22" fill="#5cffd6" opacity=".4"><animate attributeName="r" values="10;35;10" dur="5s" repeatCount="indefinite"/></circle></g>
</svg>