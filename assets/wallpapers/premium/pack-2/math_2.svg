<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated calculus observatory mathematics background">
<defs>
      <radialGradient id="bg" cx="50%" cy="45%" r="75%">
        <stop offset="0%" stop-color="#173a69"/>
        <stop offset="48%" stop-color="#09152d"/>
        <stop offset="100%" stop-color="#02040a"/>
        <animate attributeName="cx" values="42%;58%;44%;52%;42%" dur="34s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="38%;54%;44%;62%;38%" dur="39s" repeatCount="indefinite"/>
      </radialGradient>
      <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#54f2ff"/><stop offset=".5" stop-color="#b56cff"/><stop offset="1" stop-color="#fff06a"/>
        <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="22s" repeatCount="indefinite"/>
      </linearGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
        <path d="M56 0H0V56" fill="none" stroke="rgba(120,220,255,.11)" stroke-width="1"/>
        <animate attributeName="width" values="52;64;52" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="height" values="52;64;52" dur="18s" repeatCount="indefinite"/>
      </pattern>
      <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ffb86b"/><stop offset=".5" stop-color="#fff4a3"/><stop offset="1" stop-color="#61f8ff"/></linearGradient>
    </defs>
<style><![CDATA[
  svg { width:100%; height:100%; display:block; background:#05070f; }
  .soft { filter:url(#glow); }
  .formula { font-family: 'Times New Roman', Georgia, serif; fill: rgba(235,245,255,.86); font-size: 30px; letter-spacing:.5px; }
  .tiny { font-size: 18px; opacity:.68; }
  .mid { font-size: 24px; opacity:.78; }
  .stroke { fill:none; stroke-linecap:round; stroke-linejoin:round; }
  @keyframes driftA { from{transform:translate3d(-80px,20px,0)} to{transform:translate3d(80px,-20px,0)} }
  @keyframes driftB { from{transform:translate3d(50px,-40px,0)} to{transform:translate3d(-60px,40px,0)} }
  @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-32px)} }
  @keyframes pulse { 0%,100%{opacity:.38} 50%{opacity:.95} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes spinR { to{transform:rotate(-360deg)} }
  @keyframes dash { to{stroke-dashoffset:-1200} }
  @keyframes wave { 0%,100%{transform:translateX(-40px)} 50%{transform:translateX(40px)} }
  @keyframes shimmer { 0%,100%{opacity:.18} 50%{opacity:.58} }
  .driftA { animation: driftA 18s ease-in-out infinite alternate; }
  .driftB { animation: driftB 24s ease-in-out infinite alternate; }
  .float1 { animation: floatY 9s ease-in-out infinite; }
  .float2 { animation: floatY 13s ease-in-out infinite reverse; }
  .pulse { animation: pulse 7s ease-in-out infinite; }
  .spin { transform-box:fill-box; transform-origin:center; animation: spin 42s linear infinite; }
  .spinR { transform-box:fill-box; transform-origin:center; animation: spinR 58s linear infinite; }
  .dash { stroke-dasharray:22 22; animation: dash 28s linear infinite; }
  .wave { animation: wave 16s ease-in-out infinite; }
  .shimmer { animation: shimmer 11s ease-in-out infinite; }
  @media (max-width: 700px) { .formula{font-size:22px}.mid{font-size:19px}.tiny{font-size:15px} }
]]></style>
<rect width="1600" height="900" fill="#07030e"/>
<circle cx="800" cy="450" r="620" fill="url(#bg)" opacity=".78"><animate attributeName="r" values="540;660;540" dur="30s" repeatCount="indefinite"/></circle>
<g opacity=".42" class="spinR"><circle cx="800" cy="450" r="360" fill="none" stroke="url(#gold)" stroke-width="2"/><circle cx="800" cy="450" r="285" fill="none" stroke="#8dfcff" stroke-width="1.5"/><circle cx="800" cy="450" r="215" fill="none" stroke="#b989ff" stroke-width="1.5"/></g>
<g class="spin soft" transform="translate(800 450)">
 <path d="M0,-310 L34,-105 L256,-176 L112,-28 L294,96 L72,78 L0,310 L-72,78 L-294,96 L-112,-28 L-256,-176 L-34,-105 Z" fill="rgba(120,240,255,.035)" stroke="url(#cyan)" stroke-width="2"/>
</g>
<g class="wave"><path d="M-50 685 C90 560 210 805 350 680 S620 560 760 680 1010 800 1160 680 1430 560 1660 690" class="stroke soft dash" stroke="url(#gold)" stroke-width="6" opacity=".68"/></g>
<g class="formula soft driftA"><text x="120" y="200">L = T − V</text><text x="1040" y="235">Hψ = Eψ</text><text x="520" y="820" class="mid">∂u/∂t = α∇²u</text></g>
<g class="formula driftB"><text x="250" y="500" class="mid">∫<tspan baseline-shift="super">∞</tspan><tspan baseline-shift="sub">−∞</tspan> e<tspan baseline-shift="super">−x²</tspan> dx = √π</text><text x="1020" y="610" class="tiny">F(x)=∫ f(t)e<tspan baseline-shift="super">−iωt</tspan>dt</text><text x="660" y="105" class="tiny">P(A|B)=P(B|A)P(A)/P(B)</text></g>
<g class="pulse">
  <circle cx="800" cy="450" r="5" fill="#fff"/><circle cx="1120" cy="450" r="6" fill="#ffed83"><animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="20s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="165" r="6" fill="#75f7ff"><animateTransform attributeName="transform" type="rotate" from="0 800 450" to="-360 800 450" dur="28s" repeatCount="indefinite"/></circle>
</g>
</svg>