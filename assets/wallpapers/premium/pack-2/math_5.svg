<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated abstract prism mathematics background">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0018"/><stop offset=".5" stop-color="#101544"/><stop offset="1" stop-color="#001b26"/><animate attributeName="x1" values="0;.25;0" dur="19s" repeatCount="indefinite"/></linearGradient>
<filter id="g" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<style>
.poly{fill-opacity:.09;stroke-width:2;filter:url(#g);animation:breath 8s ease-in-out infinite}.f{font-family:Georgia,'Times New Roman',serif;fill:#f4fdff;filter:url(#g);font-weight:700;opacity:.82}.s{font-family:ui-monospace,Menlo,Consolas,monospace;fill:#aef7ff;opacity:.58;filter:url(#g)}.orb{filter:url(#g)}.m1{animation:m1 17s ease-in-out infinite}.m2{animation:m2 21s ease-in-out infinite}.m3{animation:m3 25s ease-in-out infinite}.rot{transform-box:fill-box;transform-origin:center;animation:rot 55s linear infinite}.rot2{transform-box:fill-box;transform-origin:center;animation:rot 62s linear infinite reverse}@keyframes rot{to{transform:rotate(360deg)}}@keyframes breath{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.035)}}@keyframes m1{0%,100%{transform:translate(0,0)}50%{transform:translate(34px,-30px)}}@keyframes m2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,28px)}}@keyframes m3{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,38px)}}@media(max-width:700px){.f{font-size:34px}.s{font-size:22px}.hide{display:none}}</style>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<circle cx="360" cy="240" r="310" fill="#00e5ff" opacity=".13"><animate attributeName="cx" values="360;1180;360" dur="30s" repeatCount="indefinite"/></circle>
<circle cx="1250" cy="640" r="340" fill="#ff2bd6" opacity=".13"><animate attributeName="cy" values="640;220;640" dur="33s" repeatCount="indefinite"/></circle>
<g class="rot" opacity=".8"><polygon class="poly" points="800,120 1130,310 1130,690 800,880 470,690 470,310" stroke="#00e5ff" fill="#00e5ff"/><polygon class="poly" points="800,210 1050,350 1050,630 800,770 550,630 550,350" stroke="#ff4fe3" fill="#ff4fe3" style="animation-delay:-2s"/></g>
<g class="rot2" opacity=".7"><path d="M300 450 C500 160 1100 160 1300 450 C1100 740 500 740 300 450Z" fill="none" stroke="#00ffa8" stroke-width="2" stroke-opacity=".35" stroke-dasharray="18 26"><animate attributeName="stroke-dashoffset" values="0;-900" dur="20s" repeatCount="indefinite"/></path><path d="M800 130 C960 320 960 580 800 770 C640 580 640 320 800 130Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity=".22" stroke-dasharray="12 18"><animate attributeName="stroke-dashoffset" values="0;700" dur="18s" repeatCount="indefinite"/></path></g>
<g class="m1"><text x="105" y="145" class="f" font-size="42">вҲ«вҲ«<tspan baseline-shift="sub" font-size="25">D</tspan> f(x,y)dA</text><text x="112" y="196" class="s" font-size="25">surface accumulation</text></g>
<g class="m2"><text x="1015" y="155" class="f" font-size="39">xВІ/aВІ + yВІ/bВІ = 1</text><text x="1025" y="206" class="s" font-size="25">ellipse equation</text></g>
<g class="m3"><text x="135" y="780" class="f" font-size="40">Пғ = вҲҡVar(X)</text><text x="140" y="828" class="s" font-size="24">standard deviation</text></g>
<g class="m1 hide"><text x="1030" y="755" class="f" font-size="37">вҲҮГ—B = ОјвӮҖJ + ОјвӮҖОөвӮҖвҲӮE/вҲӮt</text><text x="1040" y="805" class="s" font-size="24">Maxwell-AmpГЁre law</text></g>
<g filter="url(#g)"><circle r="7" fill="#00e5ff"><animateMotion dur="12s" repeatCount="indefinite" path="M300 450 C500 160 1100 160 1300 450 C1100 740 500 740 300 450Z"/></circle><circle r="6" fill="#ff4fe3"><animateMotion dur="17s" repeatCount="indefinite" path="M1300 450 C1100 740 500 740 300 450 C500 160 1100 160 1300 450Z"/></circle><circle r="5" fill="#00ffa8"><animateMotion dur="21s" repeatCount="indefinite" path="M800 130 C960 320 960 580 800 770 C640 580 640 320 800 130Z"/></circle></g>
<g opacity=".65"><text x="760" y="462" class="f" font-size="68">ОЈ</text><text x="726" y="515" class="s" font-size="24">n=1 вҶ’ вҲһ</text><animateTransform attributeName="transform" type="translate" values="0 0;0 -18;0 0" dur="6s" repeatCount="indefinite"/></g>
</svg>
