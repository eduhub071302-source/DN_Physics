<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Ultra smooth animated mathematics background</title>
  <desc id="desc">Responsive desktop and mobile SVG background with real mathematical formulas, glowing graphs, animated particles, geometric constructions, and ultra-smooth looped motion.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816">
        <animate attributeName="stop-color" values="#050816;#091a35;#14082d;#050816" dur="28s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
      </stop>
      <stop offset="48%" stop-color="#101d4b">
        <animate attributeName="stop-color" values="#101d4b;#062b45;#26145b;#101d4b" dur="32s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
      </stop>
      <stop offset="100%" stop-color="#02030a">
        <animate attributeName="stop-color" values="#02030a;#071324;#130720;#02030a" dur="30s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
      </stop>
    </linearGradient>

    <radialGradient id="auraCyan" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#41f4ff" stop-opacity="0.60"/>
      <stop offset="42%" stop-color="#41f4ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#41f4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraPink" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff5df7" stop-opacity="0.46"/>
      <stop offset="50%" stop-color="#a970ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff5df7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraGold" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe66d" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#79ffd0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffe66d" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
      <path d="M36 0V72M0 36H72" fill="none" stroke="#66e3ff" stroke-opacity="0.025" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.8" fill="#8efbff" fill-opacity="0.16"/>
    </pattern>

    <filter id="blur" x="-45%" y="-45%" width="190%" height="190%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="textGlow" x="-50%" y="-60%" width="200%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="glow"/>
      <feColorMatrix in="glow" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.95 0 0 0 0 1 0 0 0 .9 0" result="coloredGlow"/>
      <feMerge><feMergeNode in="coloredGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .formula{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;fill:#eefcff;fill-opacity:.72;filter:url(#textGlow);letter-spacing:.3px}
      .muted{fill-opacity:.44}.hot{fill:#ffe66d;fill-opacity:.88}.cyanText{fill:#88f7ff}.pinkText{fill:#ffc6ff}.mintText{fill:#a7ffd9}
      .s{font-size:27px}.m{font-size:38px}.l{font-size:54px}.xl{font-size:72px}
      .line{fill:none;stroke-linecap:round;stroke-linejoin:round;filter:url(#strongGlow)}
      .cyan{stroke:#5beeff}.pink{stroke:#ff75f6}.mint{stroke:#7cffce}.gold{stroke:#ffe66d}.white{stroke:#ffffff}
      .thin{stroke-width:1.8;stroke-opacity:.34}.mid{stroke-width:3;stroke-opacity:.50}.thick{stroke-width:5;stroke-opacity:.55}
      @media(max-width:700px){.mobile-hide{display:none}.s{font-size:36px}.m{font-size:49px}.l{font-size:66px}.xl{font-size:82px}.formula{fill-opacity:.78}}
      @media(prefers-reduced-motion:reduce){animate,animateTransform,animateMotion{display:none}}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity=".94">
    <circle cx="235" cy="170" r="310" fill="url(#auraCyan)" filter="url(#blur)">
      <animate attributeName="cx" values="210;430;315;210" dur="34s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
      <animate attributeName="cy" values="160;230;405;160" dur="38s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
    </circle>
    <circle cx="1285" cy="630" r="390" fill="url(#auraPink)" filter="url(#blur)">
      <animate attributeName="cx" values="1285;1045;1400;1285" dur="42s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
      <animate attributeName="cy" values="630;500;705;630" dur="44s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
    </circle>
    <circle cx="820" cy="455" r="260" fill="url(#auraGold)" filter="url(#blur)">
      <animate attributeName="r" values="230;310;250;230" dur="26s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1;.45 0 .55 1"/>
    </circle>
  </g>

  <rect width="1600" height="900" fill="url(#grid)" opacity=".9">
    <animateTransform attributeName="transform" type="translate" values="0 0;72 72;0 0" dur="52s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </rect>

  <g opacity=".9">
    <path class="line cyan thick" d="M-40 610 C170 500 300 760 510 610 S820 330 1040 490 1320 750 1640 540">
      <animate attributeName="d" dur="18s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"
        values="M-40 610 C170 500 300 760 510 610 S820 330 1040 490 1320 750 1640 540;M-40 570 C210 720 345 455 555 595 S815 720 1060 475 1330 355 1640 585;M-40 610 C170 500 300 760 510 610 S820 330 1040 490 1320 750 1640 540"/>
    </path>
    <path class="line pink mid" d="M-30 310 C205 200 390 450 600 340 S920 145 1135 245 1380 470 1630 375">
      <animate attributeName="d" dur="22s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"
        values="M-30 310 C205 200 390 450 600 340 S920 145 1135 245 1380 470 1630 375;M-30 365 C250 455 390 175 635 335 S920 485 1165 260 1395 185 1630 430;M-30 310 C205 200 390 450 600 340 S920 145 1135 245 1380 470 1630 375"/>
    </path>
    <path class="line gold thin mobile-hide" d="M0 455 C250 375 450 530 650 455 S980 260 1210 370 1420 510 1600 455">
      <animate attributeName="stroke-opacity" values=".16;.56;.16" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </path>
  </g>

  <g transform="translate(1175 238)" opacity=".86">
    <circle r="132" fill="none" stroke="#fff" stroke-opacity=".15" stroke-width="2"/>
    <ellipse rx="190" ry="54" class="line cyan thin"/>
    <ellipse rx="190" ry="54" class="line pink thin" transform="rotate(60)"/>
    <ellipse rx="190" ry="54" class="line mint thin" transform="rotate(120)"/>
    <circle cx="190" cy="0" r="7" fill="#5beeff" filter="url(#strongGlow)">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-95" cy="164" r="6" fill="#ff75f6" filter="url(#strongGlow)">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="17s" repeatCount="indefinite"/>
    </circle>
    <animateTransform attributeName="transform" type="translate" values="1175 238;1200 258;1175 238" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    <animateTransform attributeName="transform" additive="sum" type="rotate" values="0;360" dur="68s" repeatCount="indefinite"/>
  </g>

  <g class="mobile-hide" transform="translate(340 660)" opacity=".76">
    <polygon points="0,-106 92,55 -92,55" fill="none" stroke="#fff" stroke-opacity=".20" stroke-width="2"/>
    <path d="M0,-106L0,55M-92,55L92,55" stroke="#7cffce" stroke-opacity=".18"/>
    <circle cx="0" cy="-106" r="7" fill="#ffe66d"/><circle cx="92" cy="55" r="7" fill="#5beeff"/><circle cx="-92" cy="55" r="7" fill="#ff75f6"/>
    <animateTransform attributeName="transform" type="translate" values="340 660;370 625;340 660" dur="19s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </g>

  <g class="formula">
    <g>
      <text class="xl cyanText" x="95" y="150">∫<tspan font-size="58%">∞</tspan><tspan baseline-shift="sub" font-size="48%">0</tspan> e<tspan baseline-shift="super" font-size="55%">-x²</tspan> dx = √π/2</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -16;0 0" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <animate attributeName="opacity" values=".72;.96;.72" dur="12s" repeatCount="indefinite"/>
    </g>
    <g>
      <text class="l pinkText" x="835" y="132">e<tspan baseline-shift="super" font-size="60%">iπ</tspan> + 1 = 0</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;18 10;0 0" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </g>
    <g class="mobile-hide muted">
      <text class="m" x="1195" y="515">∇ × E = -∂B/∂t</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;-20 14;0 0" dur="17s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </g>
    <g>
      <text class="l mintText" x="155" y="485">x = [-b ± √(b² - 4ac)] / 2a</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 18;0 0" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </g>
    <g>
      <text class="m hot" x="670" y="760">ζ(2) = Σ<tspan baseline-shift="super" font-size="55%">∞</tspan><tspan baseline-shift="sub" font-size="50%">n=1</tspan> 1/n² = π²/6</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;24 -12;0 0" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </g>
    <g class="mobile-hide muted">
      <text class="s" x="1045" y="815">F = G(m₁m₂)/r²</text>
      <text class="s" x="470" y="305">det(A) ≠ 0 ⇒ A<tspan baseline-shift="super" font-size="55%">-1</tspan> exists</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;-14 -10;0 0" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </g>
  </g>

  <g opacity=".72" filter="url(#strongGlow)">
    <circle r="4" fill="#5beeff"><animateMotion dur="18s" repeatCount="indefinite" path="M120,720 C360,520 540,770 780,585 S1190,300 1510,620" calcMode="spline" keySplines=".45 0 .55 1"/></circle>
    <circle r="5" fill="#ff75f6"><animateMotion dur="23s" repeatCount="indefinite" path="M1500,180 C1230,95 980,330 780,240 S390,90 115,360" calcMode="spline" keySplines=".45 0 .55 1"/></circle>
    <circle r="4" fill="#ffe66d"><animateMotion dur="20s" repeatCount="indefinite" path="M220,250 C485,120 690,430 880,335 S1280,480 1450,250" calcMode="spline" keySplines=".45 0 .55 1"/></circle>
    <circle r="4" fill="#7cffce"><animateMotion dur="25s" repeatCount="indefinite" path="M1440,760 C1160,650 960,840 710,675 S330,480 135,620" calcMode="spline" keySplines=".45 0 .55 1"/></circle>
  </g>

  <g opacity=".24" class="mobile-hide">
    <path d="M740 80v760M80 450h1440" class="line white thin"/>
    <path d="M740 450 C810 320 910 260 1035 270" class="line mint mid"/>
    <path d="M740 450 C650 540 535 590 395 575" class="line gold thin"/>
  </g>

  <rect width="1600" height="900" fill="#000" opacity=".13"/>
  <rect width="1600" height="900" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="2"/>
</svg>
