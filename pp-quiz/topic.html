<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic | PP Quiz</title>
  <meta
    name="description"
    content="Choose a subtopic and continue your past paper MCQ practice."
  />
  <link rel="stylesheet" href="/pp-quiz/css/quiz.css?v=22" />
</head>
<body>

  <header class="quiz-header">
    <div class="container">
      <a id="backToTopicsLink" class="back-link" href="/pp-quiz/index.html?subject=physics">← Back to Topics</a>
      <h1 id="topicTitle">Loading Topic...</h1>

      <div class="page-top-actions">
        <button id="refreshTopicBtn" class="action-btn" type="button">↻ Refresh</button>
      </div>
    </div>
  </header>

  <main class="quiz-main">
    <div class="container">

      <section class="topic-card fade-slide-up" style="margin-bottom: 20px; min-height: auto;">
        <div class="topic-card-top">
          <div class="topic-body">
            <div class="topic-pill">DinuuNOVA • Topic Practice</div>
            <h2 id="topicHeroTitle" class="topic-title" style="font-size: 34px; margin-top: 10px;">Loading...</h2>
            <p id="topicHeroText" class="topic-desc" style="max-width: 760px;">
              Preparing subtopics...
            </p>
          </div>

          <div class="topic-icon" aria-hidden="true">📘</div>
        </div>
      </section>

      <section class="fade-slide-up" style="margin-bottom: 16px;">
        <div style="display: flex; align-items: end; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
          <div>
            <h3 style="margin: 0 0 6px; font-size: 26px;">Choose a Subtopic</h3>
            <p style="margin: 0; color: var(--muted);">
              Tap a subtopic to continue.
            </p>
          </div>
        </div>
      </section>

      <section id="subtopicsGrid" class="topics-grid fade-in" aria-live="polite">
        <article class="skeleton-card">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-line lg"></div>
          <div class="skeleton-line md"></div>
          <div class="skeleton-line sm"></div>
          <div class="skeleton-box"></div>
        </article>

        <article class="skeleton-card">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-line lg"></div>
          <div class="skeleton-line md"></div>
          <div class="skeleton-line sm"></div>
          <div class="skeleton-box"></div>
        </article>
      </section>

    </div>
  </main>

  <audio id="bgMusic" loop></audio>

  <div id="musicPlayerFloating" class="music-floating">
    <button id="musicToggleBtn" class="music-float-btn" type="button" aria-label="Open music player">🎧</button>

    <div id="musicPanel" class="music-panel">
      <div class="music-header">Focus Music</div>

      <div class="music-row">
        <select id="trackSelect" aria-label="Select music track"></select>
      </div>

      <div class="music-row">
        <button id="playPauseBtn" type="button">▶ Play</button>
        <button id="stopMusicBtn" type="button">⏹ Stop</button>
      </div>

      <div class="music-row">
        <input
          id="volumeSlider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.35"
          aria-label="Music volume"
        />
      </div>

      <div id="currentTrackLabel" class="music-label">Current: None</div>
    </div>
  </div>

  <footer style="
    margin-top:40px;
    padding:20px;
    text-align:center;
    font-size:14px;
    color:#a8b3cf;
    border-top:1px solid #24314f;
  ">
    <a href="/privacy.html">Privacy Policy</a> |
    <a href="/terms.html">Terms</a> |
    <a href="/contact.html">Contact</a>
  </footer>

  <script src="/js/app-config.js"></script>
  <script src="/js/unlock.js"></script>
  <script src="/js/music-player.js"></script>
  <script src="/pp-quiz/js/topic.js"></script>

</body>
</html>
