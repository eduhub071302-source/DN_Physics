<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic | PP Quiz</title>
  <link rel="stylesheet" href="/DN_Physics/pp-quiz/css/quiz.css" />
</head>
<body>

<header class="quiz-header">
  <div class="container">
    <a class="back-link" href="/DN_Physics/pp-quiz/index.html">← Back to Topics</a>
    <h1 id="topicTitle">Topic</h1>
    <p>Select a subtopic</p>
  </div>
</header>

<main class="container">
  <section id="subtopicsGrid" class="topics-grid"></section>
</main>

<!-- 🎧 MUSIC -->
<audio id="bgMusic" loop></audio>

<div id="musicPlayerFloating" class="music-floating">
  <button id="musicToggleBtn" class="music-float-btn">🎧</button>

  <div id="musicPanel" class="music-panel">
    <div class="music-header">Focus Music</div>

    <div class="music-row">
      <select id="trackSelect"></select>
    </div>

    <div class="music-row">
      <button id="playPauseBtn">▶ Play</button>
      <button id="stopMusicBtn">⏹ Stop</button>
    </div>

    <div class="music-row">
      <input id="volumeSlider" type="range" min="0" max="1" step="0.01" />
    </div>

    <div id="currentTrackLabel"></div>
  </div>
</div>

<script src="/DN_Physics/js/music-player.js"></script>
<script src="/DN_Physics/pp-quiz/js/topic.js"></script>

</body>
</html>
