<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz | PP Quiz</title>
  <link rel="stylesheet" href="/DN_Physics/pp-quiz/css/quiz.css" />

  <style>
    html, body {
      overflow-x: hidden;
      scroll-behavior: auto;
    }

    /* 🔥 Update banner (quiz safe) */
    .quiz-update-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #1e3a8a, #2563eb);
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      text-align: center;
      z-index: 5000;
      display: none;
    }

    .quiz-update-banner.show {
      display: block;
    }

    .quiz-update-banner button {
      margin-left: 10px;
      background: #fff;
      color: #1e3a8a;
      border: none;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 🔥 UPDATE SAFE BANNER -->
  <div id="quizUpdateBanner" class="quiz-update-banner">
    New update available. It will apply after you finish the quiz.
    <button id="updateAfterBtn">Update Now</button>
  </div>

  <header class="quiz-header">
    <div class="container">
      <a id="backToSubtopic" class="back-link" href="/DN_Physics/pp-quiz/index.html">← Back</a>
      <h1 id="quizTitle">Quiz</h1>
      <p id="quizSubtitle">Question viewer</p>
    </div>
  </header>

  <!-- (UNCHANGED CONTENT BELOW — SAME AS YOUR FILE) -->
  <!-- I did NOT remove anything, only added system -->

  <!-- 🎧 MUSIC -->
  <audio id="bgMusic" loop></audio>

  <div id="musicPlayerFloating" class="music-floating">
    <button id="musicToggleBtn" class="music-float-btn" type="button">🎧</button>

    <div id="musicPanel" class="music-panel">
      <div class="music-header">Focus Music</div>

      <div class="music-row">
        <select id="trackSelect"></select>
      </div>

      <div class="music-row">
        <button id="playPauseBtn" type="button">▶ Play</button>
        <button id="stopMusicBtn" type="button">⏹ Stop</button>
      </div>

      <div class="music-row">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.35" />
      </div>

      <div id="currentTrackLabel" class="music-label">Current: None</div>
    </div>
  </div>

  <script src="/DN_Physics/js/music-player.js"></script>
  <script src="/DN_Physics/pp-quiz/js/quiz.js"></script>

  <!-- 🔥 UPDATE CONTROL SYSTEM -->
  <script>
    let updateWaiting = false;

    const banner = document.getElementById("quizUpdateBanner");
    const updateBtn = document.getElementById("updateAfterBtn");

    if ("serviceWorker" in navigator) {

      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data && event.data.type === "SW_UPDATED") {

          // 🚫 DO NOT reload during quiz
          updateWaiting = true;

          if (banner) {
            banner.classList.add("show");
          }
        }
      });
    }

    // 🔥 manual update button
    if (updateBtn) {
      updateBtn.addEventListener("click", async () => {

        const registration = await navigator.serviceWorker.getRegistration();

        if (registration && registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }

        setTimeout(() => {
          window.location.reload();
        }, 500);
      });
    }

    // 🔥 Apply update when leaving quiz
    window.addEventListener("beforeunload", async () => {
      if (!updateWaiting) return;

      const registration = await navigator.serviceWorker.getRegistration();

      if (registration && registration.waiting) {
        registration.waiting.postMessage({ type: "SKIP_WAITING" });
      }
    });
  </script>

</body>
</html>
