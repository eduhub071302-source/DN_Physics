<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz | PP Quiz</title>
  <link rel="stylesheet" href="/DN_Physics/pp-quiz/css/quiz.css" />
</head>
<body>
  <header class="quiz-header">
    <div class="container">
      <a id="backToSubtopic" class="back-link" href="/DN_Physics/pp-quiz/index.html">← Back</a>
      <h1 id="quizTitle">Quiz</h1>
      <p id="quizSubtitle">Question viewer</p>
    </div>
  </header>

  <main class="container quiz-page">
    <div id="attemptInfoCard" class="quiz-view-card attempt-info-card">
      <h2>Your Progress</h2>
      <div id="attemptInfo" class="result-summary">
        <div><strong>Last Score:</strong> No previous attempt</div>
        <div><strong>Best Score:</strong> No previous attempt</div>
        <div><strong>Attempts:</strong> 0</div>
        <div><strong>Badge:</strong> None</div>
      </div>
    </div>

    <div class="quiz-view-card">
      <div class="quiz-top-row">
        <div id="questionCounter" class="quiz-counter">Question 1 of 1</div>
        <div id="answeredCounter" class="quiz-counter">Answered: 0</div>
      </div>

      <div class="quiz-image-wrap zoomable-wrap" id="zoomWrap">
        <img id="questionImage" class="quiz-image zoomable-image" src="" alt="Question image" />
        <button id="zoomBtn" class="zoom-btn" type="button">🔍 Zoom</button>
      </div>

      <div class="answer-section">
        <h3 class="answer-title">Choose Your Answer</h3>
        <div class="answer-grid">
          <button class="answer-btn" data-answer="1" type="button">1</button>
          <button class="answer-btn" data-answer="2" type="button">2</button>
          <button class="answer-btn" data-answer="3" type="button">3</button>
          <button class="answer-btn" data-answer="4" type="button">4</button>
          <button class="answer-btn" data-answer="5" type="button">5</button>
        </div>
      </div>

      <div id="reviewNote" class="review-note" style="display:none;">
        Review mode: red = your wrong answer, green = correct answer.
      </div>

      <div class="quiz-nav">
        <button id="prevBtn" class="btn" type="button">← Previous</button>
        <button id="nextBtn" class="btn btn-primary" type="button">Next →</button>
      </div>

      <div class="submit-wrap">
        <button id="finishQuizBtn" class="btn" type="button">Finish Now</button>
        <button id="submitQuizBtn" class="btn btn-primary submit-btn" type="button" style="display:none;">
          Submit Quiz
        </button>
      </div>

      <div id="postResultActions" class="submit-wrap" style="display:none;">
        <button id="retryQuizBtn" class="btn" type="button">Retry Full Quiz</button>
        <button id="retryWrongBtn" class="btn" type="button" style="display:none;">Retry Wrong Questions Only</button>
        <button id="wrongOnlyBtn" class="btn btn-primary" type="button" style="display:none;">
          Go to Wrong Question
        </button>
      </div>
    </div>

    <div id="resultCard" class="quiz-view-card result-card" style="display:none;">
      <h2>Quiz Result</h2>
      <div id="resultSummary" class="result-summary"></div>
    </div>
  </main>

  <div id="imageModal" class="image-modal" style="display:none;">
    <button id="closeImageModal" class="image-modal-close" type="button">✕</button>
    <div id="imageModalViewport" class="image-modal-viewport">
      <img id="modalImage" class="image-modal-img" src="" alt="Full screen question image" />
    </div>
  </div>

  <!-- 🎧 MUSIC -->
  <audio id="bgMusic" loop></audio>

  <div id="musicPlayerFloating" class="music-floating">
    <button id="musicToggleBtn" class="music-float-btn" type="button">🎧</button>

    <div id="musicPanel" class="music-panel">
      <div class="music-header">Focus Music</div>

      <div class="music-row">
        <select id="trackSelect"></select>
      </div>

      <div class="music-row">
        <button id="playPauseBtn" type="button">▶ Play</button>
        <button id="stopMusicBtn" type="button">⏹ Stop</button>
      </div>

      <div class="music-row">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.35" />
      </div>

      <div id="currentTrackLabel" class="music-label">Current: None</div>
    </div>
  </div>

  <script src="/DN_Physics/js/music-player.js"></script>
  <script src="/DN_Physics/pp-quiz/js/quiz.js"></script>
</body>
</html>
