<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Status | DN Physics</title>
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .pay-status-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 14px;
      background:
        radial-gradient(circle at top, rgba(78,161,255,0.18), transparent 34%),
        linear-gradient(180deg, #07101d, #0b1220);
    }

    .pay-status-card {
      width: min(720px, 94vw);
      padding: 30px 24px;
      border-radius: 28px;
      text-align: center;
      border: 1px solid rgba(124,196,255,0.18);
      background:
        radial-gradient(circle at top right, rgba(78,161,255,0.18), transparent 36%),
        linear-gradient(180deg, rgba(17,26,43,0.98), rgba(10,16,28,0.99));
      box-shadow: 0 30px 80px rgba(0,0,0,0.42);
    }

    .pay-status-orb {
      width: 86px;
      height: 86px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 38px;
      background: linear-gradient(135deg, #4ea1ff, #7cc4ff);
      color: #04101f;
      box-shadow: 0 18px 44px rgba(78,161,255,0.28);
      animation: payPulse 1.4s ease infinite;
    }

    .pay-status-badge {
      display: inline-flex;
      padding: 7px 13px;
      border-radius: 999px;
      margin-bottom: 14px;
      background: rgba(78,161,255,0.12);
      border: 1px solid rgba(124,196,255,0.22);
      color: #9fd0ff;
      font-weight: 800;
      font-size: 13px;
    }

    .pay-status-card h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
    }

    .pay-status-card p {
      margin: 0;
      color: #a8b3cf;
      line-height: 1.7;
    }

    .pay-meta {
      margin: 18px auto 0;
      padding: 14px;
      max-width: 520px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: #dceaff;
      font-size: 14px;
      word-break: break-word;
    }

    .pay-progress {
      width: min(420px, 100%);
      height: 10px;
      margin: 24px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }

    .pay-progress-fill {
      width: 35%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4ea1ff, #7cc4ff);
      animation: paySlide 1.1s ease-in-out infinite;
    }

    .pay-actions {
      margin-top: 22px;
      display: none;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .pay-success .pay-status-orb {
      background: linear-gradient(135deg, #42c883, #9be7a0);
      box-shadow: 0 18px 44px rgba(66,200,131,0.24);
      animation: none;
    }

    .pay-warning .pay-status-orb {
      background: linear-gradient(135deg, #ffb347, #ffd54a);
      animation: none;
    }

    .pay-error .pay-status-orb {
      background: linear-gradient(135deg, #ff6b6b, #ff9a9a);
      animation: none;
    }

    @keyframes payPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes paySlide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>

<body>
  <main class="pay-status-page">
    <section id="statusCard" class="pay-status-card">
      <div id="statusIcon" class="pay-status-orb">💳</div>
      <div class="pay-status-badge">DN Physics Secure Checkout</div>

      <h1 id="pageTitle">Verifying payment...</h1>
      <p id="statusText">Please wait while we confirm your payment and activate your premium access.</p>

      <div id="statusMeta" class="pay-meta"></div>

      <div id="progressBar" class="pay-progress">
        <div class="pay-progress-fill"></div>
      </div>

      <div id="actionArea" class="pay-actions">
        <button id="retryBtn" class="btn btn-primary" type="button">
          Retry Verification
        </button>
        <a href="/index.html" class="btn">Go Home</a>
      </div>
    </section>
  </main>

  <script src="/js/app-config.js"></script>
  <script type="module" src="/js/unlock.js"></script>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);

      const statusCard = document.getElementById("statusCard");
      const statusIcon = document.getElementById("statusIcon");
      const pageTitle = document.getElementById("pageTitle");
      const statusText = document.getElementById("statusText");
      const statusMeta = document.getElementById("statusMeta");
      const actionArea = document.getElementById("actionArea");
      const retryBtn = document.getElementById("retryBtn");
      const progressBar = document.getElementById("progressBar");

      const MAX_RETRIES = 8;
      const RETRY_DELAY_MS = 3000;

      let isVerifying = false;

      function getResolvedOrderId() {
        try {
          return (
            params.get("order_id") ||
            params.get("orderId") ||
            params.get("merchant_id") ||
            (typeof getPendingOrderId === "function" ? getPendingOrderId() : "") ||
            ""
          );
        } catch {
          return "";
        }
      }

      function showActions() {
        if (actionArea) actionArea.style.display = "flex";
      }

      function hideActions() {
        if (actionArea) actionArea.style.display = "none";
      }

      function setRetryEnabled(enabled) {
        if (!retryBtn) return;
        retryBtn.disabled = !enabled;
        retryBtn.textContent = enabled ? "Retry Verification" : "Checking...";
      }

      function setState(type, icon, title, text, meta = "") {
        statusCard.classList.remove("pay-success", "pay-warning", "pay-error");
        if (type) statusCard.classList.add(type);

        if (statusIcon) statusIcon.textContent = icon;
        if (pageTitle) pageTitle.textContent = title;
        if (statusText) statusText.textContent = text;
        if (statusMeta) statusMeta.textContent = meta;

        if (progressBar) {
          progressBar.style.display =
            type === "pay-success" || type === "pay-warning" || type === "pay-error"
              ? "none"
              : "block";
        }
      }

      function safeDelay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function verifyPaymentWithRetry() {
        if (isVerifying) return;

        const orderId = getResolvedOrderId();
        const provider = params.get("provider") || "";
        const paypalToken = params.get("token") || "";

        if (provider === "paypal" && paypalToken) {
          try {
            setState(
              "",
              "🌍",
              "Completing PayPal payment...",
              "Please wait while we capture your PayPal payment.",
              `PayPal token: ${paypalToken}`
            );

            const res = await fetch(
              DN_CONFIG.BACKEND.API_BASE_URL + "/api/paypal/capture-order",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paypalOrderId: paypalToken }),
              }
            );

            const data = await res.json();

            if (res.ok && data.ok && data.paid) {
              applyServerUnlock(data.orderId || "", Number(data.expiresAt) || 0);

              setState(
                "pay-success",
                "✓",
                "PayPal payment verified",
                "Your DN Physics Pro access is now active. Redirecting you home...",
                `Order ID: ${data.orderId || ""}`
              );

              setTimeout(() => {
                window.location.href = "/index.html";
              }, 1500);

              return;
            }
  
            throw new Error(data.message || "PayPal capture failed.");
          } catch (error) {
            console.error("PayPal capture error:", error);

            setState(
              "pay-error",
              "!",
              "PayPal payment failed",
              "We could not complete your PayPal payment.",
              error.message || "Please return home and try again."
            );

            showActions();
            return;
          }
        }

        if (!orderId) {
          setState(
            "pay-error",
            "!",
            "No order found",
            "We could not find your payment details.",
            "Please return home and try again."
          );
          showActions();
          return;
        }

        if (
          typeof checkServerUnlockStatus !== "function" ||
          typeof applyServerUnlock !== "function"
        ) {
          setState(
            "pay-error",
            "!",
            "Unlock system not ready",
            "Payment verification is not available right now.",
            "Please refresh the page or return home."
          );
          showActions();
          return;
        }

        isVerifying = true;
        hideActions();
        setRetryEnabled(false);

        setState(
          "",
          "💳",
          "Verifying payment...",
          "Please wait while we confirm your payment and activate your premium access.",
          `Order ID: ${orderId}`
        );

        for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
          try {
            const result = await checkServerUnlockStatus(orderId);

            if (result && result.ok && result.paid) {
              if (result.productType === "dn_tokens") {
                setState(
                  "pay-success",
                  "✓",
                  "DN Tokens added",
                  `${result.tokens || 0} DN Tokens were added to your account. Redirecting you home...`,
                  `Order ID: ${result.orderId || orderId}`
                );

                if (typeof clearPendingOrderId === "function") {
                  clearPendingOrderId();
                }

                setTimeout(() => {
                  window.location.href = "/index.html";
                }, 1500);

                return;
              }

              applyServerUnlock(
                result.orderId || orderId,
                Number(result.expiresAt) || 0
              );

              setState(
                "pay-success",
                "✓",
                "Payment verified",
                "Your DN Physics Pro access is now active. Redirecting you home...",
                `Order ID: ${result.orderId || orderId}`
              );

              setTimeout(() => {
                window.location.href = "/index.html";
              }, 1500);

              return;
            }

            if (attempt < MAX_RETRIES) {
              setState(
                "",
                "💳",
                "Still verifying...",
                "Your payment is processing. We will check again automatically.",
                `Attempt ${attempt} of ${MAX_RETRIES} • Order ID: ${orderId}`
              );

              await safeDelay(RETRY_DELAY_MS);
              continue;
            }

            setState(
              "pay-warning",
              "⏳",
              "Verification delayed",
              "Your payment is not confirmed yet. This can take a short time after payment.",
              `We checked ${MAX_RETRIES} times. Order ID: ${orderId}`
            );
            showActions();
            return;
          } catch (error) {
            console.warn("Payment verification error:", error);

            if (attempt < MAX_RETRIES) {
              setState(
                "",
                "📡",
                "Connection issue...",
                "There was a temporary issue checking your payment. Retrying...",
                `Attempt ${attempt} of ${MAX_RETRIES} • Order ID: ${orderId}`
              );

              await safeDelay(RETRY_DELAY_MS);
              continue;
            }

            setState(
              "pay-error",
              "!",
              "Verification failed",
              "We could not confirm your payment right now.",
              `Order ID: ${orderId}`
            );
            showActions();
            return;
          }
        }
      }

      if (retryBtn) {
        retryBtn.addEventListener("click", async () => {
          if (isVerifying) return;
          await verifyPaymentWithRetry();
        });
      }

      window.addEventListener("load", () => {
        verifyPaymentWithRetry().finally(() => {
          isVerifying = false;
          setRetryEnabled(true);
        });
      });
    })();
  </script>
</body>
</html>
