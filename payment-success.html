<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success | DN Physics</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="section">
    <div class="container">
      <div class="card" style="max-width:700px; margin:40px auto; text-align:center;">
        <div style="font-size:48px; margin-bottom:12px;">💳</div>
        <h1 id="pageTitle">Verifying payment...</h1>
        <p id="statusText">Please wait while we unlock your app.</p>

        <div id="statusMeta" style="margin-top:10px; color:#a8b3cf; font-size:14px;"></div>

        <div
          id="actionArea"
          style="margin-top:20px; display:none; gap:12px; justify-content:center; flex-wrap:wrap;"
        >
          <button id="retryBtn" class="btn btn-primary" type="button">
            Retry Verification
          </button>
          <a href="/index.html" class="btn">Go Home</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/app-config.js"></script>
  <script type="module" src="/js/unlock.js"></script>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);

      const pageTitle = document.getElementById("pageTitle");
      const statusText = document.getElementById("statusText");
      const statusMeta = document.getElementById("statusMeta");
      const actionArea = document.getElementById("actionArea");
      const retryBtn = document.getElementById("retryBtn");

      const MAX_RETRIES = 8;
      const RETRY_DELAY_MS = 3000;

      let isVerifying = false;

      function getResolvedOrderId() {
        try {
          return (
            params.get("order_id") ||
            params.get("orderId") ||
            params.get("merchant_id") ||
            (typeof getPendingOrderId === "function" ? getPendingOrderId() : "") ||
            ""
          );
        } catch {
          return "";
        }
      }

      function showActions() {
        if (actionArea) {
          actionArea.style.display = "flex";
        }
      }

      function hideActions() {
        if (actionArea) {
          actionArea.style.display = "none";
        }
      }

      function setRetryEnabled(enabled) {
        if (retryBtn) {
          retryBtn.disabled = !enabled;
          retryBtn.textContent = enabled ? "Retry Verification" : "Checking...";
        }
      }

      function setState(title, text, meta = "") {
        if (pageTitle) pageTitle.textContent = title;
        if (statusText) statusText.textContent = text;
        if (statusMeta) statusMeta.textContent = meta;
      }

      function safeDelay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function verifyPaymentWithRetry() {
        if (isVerifying) return;

        const orderId = getResolvedOrderId();

        if (!orderId) {
          setState(
            "No order found",
            "We could not find a payment order ID for this transaction.",
            "Please return home and try again if needed."
          );
          showActions();
          return;
        }

        if (
          typeof checkServerUnlockStatus !== "function" ||
          typeof applyServerUnlock !== "function"
        ) {
          setState(
            "Unlock system not ready",
            "Payment verification tools are not available on this page.",
            "Please refresh the page or return home."
          );
          showActions();
          return;
        }

        isVerifying = true;
        hideActions();
        setRetryEnabled(false);

        setState(
          "Verifying payment...",
          "Please wait while we confirm your payment and unlock the app.",
          `Order ID: ${orderId}`
        );

        for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
          try {
            const result = await checkServerUnlockStatus(orderId);

            if (result && result.ok && result.paid) {
              applyServerUnlock(
                result.orderId || orderId,
                Number(result.expiresAt) || 0
              );

              setState(
                "Payment verified ✅",
                "Your app has been unlocked successfully. Redirecting to home...",
                `Order ID: ${result.orderId || orderId}`
              );

              setTimeout(() => {
                window.location.href = "/index.html";
              }, 1500);

              return;
            }

            if (attempt < MAX_RETRIES) {
              setState(
                "Still verifying...",
                "Your payment may still be processing. We are checking again automatically.",
                `Attempt ${attempt} of ${MAX_RETRIES} • Order ID: ${orderId}`
              );

              await safeDelay(RETRY_DELAY_MS);
              continue;
            }

            setState(
              "Verification delayed",
              "Your payment is not confirmed yet. This can happen for a short time after payment.",
              `We checked ${MAX_RETRIES} times. Order ID: ${orderId}`
            );
            showActions();
            return;
          } catch (error) {
            console.warn("Payment verification error:", error);

            if (attempt < MAX_RETRIES) {
              setState(
                "Connection issue...",
                "We had a temporary issue while checking your payment. Retrying automatically...",
                `Attempt ${attempt} of ${MAX_RETRIES} • Order ID: ${orderId}`
              );

              await safeDelay(RETRY_DELAY_MS);
              continue;
            }

            setState(
              "Verification failed",
              "We could not confirm the payment right now due to a network or server issue.",
              `Order ID: ${orderId}`
            );
            showActions();
            return;
          }
        }
      }

      if (retryBtn) {
        retryBtn.addEventListener("click", async () => {
          if (isVerifying) return;
          await verifyPaymentWithRetry();
        });
      }

      window.addEventListener("load", () => {
        verifyPaymentWithRetry().finally(() => {
          isVerifying = false;
          setRetryEnabled(true);
        });
      });

      const originalVerify = verifyPaymentWithRetry;
      verifyPaymentWithRetry = async function () {
        try {
          await originalVerify();
        } finally {
          isVerifying = false;
          setRetryEnabled(true);
        }
      };
    })();
  </script>
</body>
</html>
